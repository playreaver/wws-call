<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DropShare • P2P файлы</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #050505;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Glassmorphic gradient background */
        .gradient-bg {
            background: radial-gradient(circle at 20% 30%, rgba(168,85,247,0.2), rgba(236,72,153,0.1), transparent 80%);
        }

        .scrollable {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

        .scrollable::-webkit-scrollbar {
            width: 4px;
        }

        .scrollable::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .scrollable::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        .app {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            background: rgba(5,5,5,0.85);
            backdrop-filter: blur(20px);
        }

        .screen {
            flex: 1;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Home screen */
        .home-screen {
            padding: 24px 20px;
            align-items: center;
            justify-content: center;
            gap: 48px;
        }

        .logo {
            text-align: center;
            animation: slideUp 0.5s ease;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(168,85,247,0.8), rgba(236,72,153,0.8));
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 20px 35px -12px rgba(168,85,247,0.3);
            backdrop-filter: blur(4px);
        }

        .logo-icon i {
            font-size: 40px;
            color: white;
        }

        .logo h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #f0abfc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .logo p {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            font-weight: 500;
        }

        .action-cards {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .create-card, .join-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .create-card {
            background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(236,72,153,0.2));
            border: 1px solid rgba(168,85,247,0.5);
        }

        .create-btn {
            width: 100%;
            background: linear-gradient(135deg, #a855f7, #ec489a);
            border: none;
            border-radius: 20px;
            padding: 16px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(168,85,247,0.3);
        }

        .create-btn:active {
            transform: scale(0.97);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            margin: 16px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.15);
        }

        .join-input {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 16px 20px;
            color: white;
            font-size: 16px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 2px;
            outline: none;
            transition: all 0.2s;
        }

        .join-input:focus {
            border-color: #a855f7;
            background: rgba(255,255,255,0.12);
        }

        .join-input::placeholder {
            color: rgba(255,255,255,0.4);
            letter-spacing: normal;
        }

        .join-btn {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 14px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .join-btn:active {
            background: rgba(255,255,255,0.15);
            transform: scale(0.98);
        }

        .badge {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            justify-content: center;
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            font-weight: 500;
        }

        /* Main screen */
        .main-screen {
            background: transparent;
        }

        .header {
            padding: 12px 16px;
            background: rgba(10,10,10,0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .room-info {
            flex: 1;
        }

        .room-label {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .room-code-display {
            font-size: 20px;
            font-weight: 800;
            font-family: monospace;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff, #f0abfc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .room-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
        }

        .action-btn:active {
            transform: scale(0.94);
            background: rgba(255,255,255,0.2);
        }

        /* Connection status moved to left to avoid overlap */
        .conn-status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.15);
            font-weight: 500;
            pointer-events: none;
        }

        .conn-dot {
            width: 8px;
            height: 8px;
            border-radius: 4px;
        }

        .conn-dot.online {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }

        .conn-dot.offline {
            background: #ef4444;
        }

        .tabs {
            display: flex;
            padding: 8px 16px;
            gap: 8px;
            background: rgba(10,10,10,0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: sticky;
            top: 64px;
            z-index: 10;
        }

        .tab {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: none;
            border-radius: 40px;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .tab i {
            font-size: 13px;
        }

        .tab.active {
            background: linear-gradient(135deg, #a855f7, #ec489a);
            color: white;
            box-shadow: 0 2px 10px rgba(168,85,247,0.3);
        }

        .tab-content {
            flex: 1;
            display: none;
            padding: 16px;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        /* Participant list - mobile optimized */
        .participants-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .participant-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.08);
            flex-wrap: wrap;
        }

        .participant-card.me {
            background: linear-gradient(135deg, rgba(168,85,247,0.15), rgba(236,72,153,0.1));
            border-color: rgba(168,85,247,0.4);
        }

        .participant-avatar {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            flex-shrink: 0;
            background: linear-gradient(135deg, #a855f7, #ec489a);
        }

        .participant-info {
            flex: 1;
            min-width: 120px;
        }

        .participant-name {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .participant-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            font-weight: 500;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 3px;
            background: #10b981;
        }

        .status-dot.connecting {
            background: #f59e0b;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .participant-badge {
            background: rgba(168,85,247,0.3);
            color: #f0abfc;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 600;
        }

        .action-group {
            display: flex;
            gap: 6px;
            margin-left: auto;
        }

        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: 19px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
        }

        .icon-btn:active {
            transform: scale(0.92);
        }

        .icon-btn.send {
            background: rgba(168,85,247,0.3);
            color: #f0abfc;
        }

        .icon-btn.kick {
            background: rgba(239,68,68,0.2);
            color: #f87171;
        }

        /* File zone */
        .file-zone {
            background: rgba(255,255,255,0.04);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 28px;
            padding: 28px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 24px;
        }

        .file-zone.drag-over {
            border-color: #a855f7;
            background: rgba(168,85,247,0.1);
            transform: scale(0.98);
        }

        .file-zone i {
            font-size: 42px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 10px;
        }

        .file-zone p {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            font-weight: 500;
        }

        .file-zone .small {
            font-size: 11px;
            margin-top: 6px;
            color: rgba(255,255,255,0.4);
        }

        .files-list, .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .file-card, .history-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
        }

        .file-icon {
            width: 44px;
            height: 44px;
            background: rgba(168,85,247,0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #f0abfc;
        }

        .file-details {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            display: flex;
            gap: 10px;
            font-weight: 500;
        }

        .mini-btn {
            width: 36px;
            height: 36px;
            border-radius: 18px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
        }

        .mini-btn.download {
            background: rgba(168,85,247,0.3);
            color: #f0abfc;
        }

        .mini-btn.delete {
            background: rgba(239,68,68,0.2);
            color: #f87171;
        }

        .bottom-bar {
            padding: 12px 20px;
            background: rgba(10,10,10,0.7);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: center;
        }

        .leave-btn {
            background: rgba(239,68,68,0.2);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 40px;
            padding: 12px 24px;
            color: #f87171;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .leave-btn:active {
            transform: scale(0.96);
            background: rgba(239,68,68,0.3);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 4000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: rgba(20,20,30,0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 24px;
            max-width: 320px;
            width: 80%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 20px 35px -10px black;
        }

        .modal i {
            font-size: 48px;
            color: #f0abfc;
            margin-bottom: 16px;
        }

        .modal h3 {
            font-size: 20px;
            margin-bottom: 12px;
        }

        .modal p {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 20px;
            word-break: break-word;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn.download {
            background: linear-gradient(135deg, #a855f7, #ec489a);
            color: white;
        }

        .modal-btn.close {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .modal-btn:active {
            transform: scale(0.96);
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 2000;
            white-space: nowrap;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #a855f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: rgba(255,255,255,0.4);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.6;
        }

        .empty-state p {
            font-size: 13px;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .home-screen { padding: 20px 16px; }
            .logo-icon { width: 70px; height: 70px; }
            .logo-icon i { font-size: 32px; }
            .logo h1 { font-size: 28px; }
            .action-cards { max-width: 100%; }
            .participant-avatar { width: 40px; height: 40px; font-size: 14px; }
            .participant-name { font-size: 13px; }
            .icon-btn { width: 36px; height: 36px; font-size: 13px; }
            .tab { padding: 8px; font-size: 12px; }
            .room-code-display { font-size: 18px; }
            .toast { white-space: normal; max-width: 80%; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div id="loadingText">Подключение...</div>
    </div>

    <div class="conn-status" id="connStatus" style="display: none;">
        <div class="conn-dot offline"></div>
        <span>Офлайн</span>
    </div>

    <div class="toast" id="toast"></div>

    <div class="modal-overlay" id="fileModal">
        <div class="modal">
            <i class="fas fa-file-alt"></i>
            <h3>Новый файл</h3>
            <p id="modalFileName"></p>
            <div class="modal-buttons">
                <button class="modal-btn download" onclick="modalDownload()">Скачать</button>
                <button class="modal-btn close" onclick="closeModal()">Закрыть</button>
            </div>
        </div>
    </div>

    <div class="app" id="app">
        <div class="screen home-screen active" id="homeScreen">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-bolt"></i>
                </div>
                <h1>DropShare</h1>
                <p>Мгновенный обмен файлами</p>
            </div>

            <div class="action-cards">
                <div class="create-card">
                    <button class="create-btn" onclick="createRoom()">
                        <i class="fas fa-plus-circle"></i>
                        Создать комнату
                    </button>
                </div>

                <div class="divider">или введите код</div>

                <div class="join-card">
                    <input type="text" class="join-input" id="roomCode" 
                           placeholder="XXXXXXXX" maxlength="8" 
                           onkeypress="if(event.key=='Enter') joinRoom()">
                    <button class="join-btn" onclick="joinRoom()">
                        <i class="fas fa-sign-in-alt"></i>
                        Присоединиться
                    </button>
                </div>
            </div>

            <div class="badge">
                <span><i class="fas fa-shield-alt"></i> P2P шифрование</span>
                <span><i class="fas fa-bolt"></i> Мгновенно</span>
                <span><i class="fas fa-mobile-alt"></i> Без регистрации</span>
            </div>
        </div>

        <div class="screen main-screen" id="mainScreen">
            <div class="header">
                <div class="room-info">
                    <div class="room-label">Код комнаты</div>
                    <div class="room-code-display" id="currentRoomCode">--------</div>
                </div>
                <div class="room-actions">
                    <button class="action-btn" onclick="copyRoomCode()">
                        <i class="fas fa-copy"></i>
                    </button>
                    <button class="action-btn share" onclick="shareRoomCode()">
                        <i class="fas fa-share-alt"></i>
                    </button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('users')">
                    <i class="fas fa-users"></i> Участники
                </button>
                <button class="tab" onclick="switchTab('files')">
                    <i class="fas fa-folder"></i> Файлы
                </button>
                <button class="tab" onclick="switchTab('history')">
                    <i class="fas fa-clock"></i> История
                </button>
            </div>

            <div class="tab-content active scrollable" id="usersTab">
                <div class="participants-list" id="participantsList"></div>
            </div>

            <div class="tab-content scrollable" id="filesTab">
                <div class="file-zone" id="fileZone" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Перетащите файл сюда</p>
                    <div class="small">или нажмите для выбора (отправить всем)</div>
                </div>
                <input type="file" id="fileInput" style="display: none" onchange="handleFiles(this.files)">
                <div class="files-list" id="filesList"></div>
            </div>

            <div class="tab-content scrollable" id="historyTab">
                <div class="history-list" id="historyList"></div>
            </div>

            <div class="bottom-bar">
                <button class="leave-btn" onclick="leaveRoom()">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
