<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DropShare • P2P файлы</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0c0a1f, #030014);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* стеклянный эффект */
        .glass {
            background: rgba(20, 20, 40, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
        }

        .glass-card {
            background: rgba(15, 15, 30, 0.55);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2rem;
        }

        .scrollable {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

        .scrollable::-webkit-scrollbar {
            width: 4px;
        }

        .scrollable::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .scrollable::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.25);
            border-radius: 10px;
        }

        .app {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            background: rgba(3, 0, 20, 0.5);
        }

        .screen {
            flex: 1;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.35s ease;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* домашний экран */
        .home-screen {
            padding: 28px 20px;
            align-items: center;
            justify-content: center;
            gap: 42px;
        }

        .logo {
            text-align: center;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #b77cff, #ff6ec7);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 20px 35px -12px rgba(168,85,247,0.4);
        }

        .logo-icon i {
            font-size: 40px;
            color: white;
        }

        .logo h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #e9b2ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: rgba(255,255,255,0.55);
            font-size: 14px;
            font-weight: 500;
        }

        .action-cards {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .create-card, .join-card {
            background: rgba(20, 20, 45, 0.55);
            backdrop-filter: blur(18px);
            border-radius: 2rem;
            padding: 1.2rem 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .create-card {
            background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(236,72,153,0.2));
            border: 1px solid rgba(168,85,247,0.4);
        }

        .create-btn, .join-btn, .send-btn {
            width: 100%;
            background: linear-gradient(135deg, #a855f7, #ec489a);
            border: none;
            border-radius: 2rem;
            padding: 14px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            box-shadow: 0 6px 14px rgba(168,85,247,0.3);
        }

        .create-btn:active, .join-btn:active, .send-btn:active {
            transform: scale(0.97);
        }

        .join-btn {
            background: rgba(255,255,255,0.1);
            box-shadow: none;
            margin-top: 12px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            margin: 8px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.2);
        }

        .join-input {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1.5px solid rgba(255,255,255,0.2);
            border-radius: 2rem;
            padding: 14px 20px;
            color: white;
            font-size: 18px;
            text-align: center;
            font-weight: 700;
            letter-spacing: 3px;
            outline: none;
        }

        .join-input:focus {
            border-color: #a855f7;
        }

        .badge {
            display: flex;
            gap: 16px;
            justify-content: center;
            color: rgba(255,255,255,0.35);
            font-size: 11px;
            font-weight: 500;
        }

        /* основной экран */
        .header {
            padding: 14px 20px;
            background: rgba(5, 5, 20, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 12;
        }

        .room-info {
            flex: 1;
        }

        .room-label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }

        .room-code-display {
            font-size: 22px;
            font-weight: 800;
            font-family: monospace;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #fff, #e0aaff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .room-actions {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 30px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        /* плашка статуса — перенесена в левый нижний угол, чтобы не перекрывать */
        .conn-status {
            position: fixed;
            bottom: 18px;
            left: 18px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(12px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 99;
            border: 1px solid rgba(255,255,255,0.2);
            font-weight: 500;
            pointer-events: none;
        }

        .conn-dot {
            width: 8px;
            height: 8px;
            border-radius: 10px;
        }

        .conn-dot.online {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }

        .conn-dot.offline {
            background: #ef4444;
        }

        .tabs {
            display: flex;
            padding: 10px 16px;
            gap: 10px;
            background: rgba(8, 8, 20, 0.7);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            position: sticky;
            top: 73px;
            z-index: 11;
        }

        .tab {
            flex: 1;
            padding: 10px 0;
            background: rgba(255,255,255,0.05);
            border: none;
            border-radius: 60px;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .tab.active {
            background: linear-gradient(135deg, #a855f7, #ec489a);
            color: white;
            box-shadow: 0 2px 12px rgba(168,85,247,0.4);
        }

        .tab-content {
            flex: 1;
            display: none;
            padding: 18px;
        }

        .tab-content.active {
            display: block;
        }

        /* карточки участников — компактно для мобилы */
        .participants-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .participant-card {
            background: rgba(30, 30, 55, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.07);
        }

        .participant-card.me {
            background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(236,72,153,0.15));
            border-color: rgba(168,85,247,0.4);
        }

        .participant-avatar {
            width: 46px;
            height: 46px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #a855f7, #ec489a);
        }

        .participant-info {
            flex: 1;
            min-width: 0;
        }

        .participant-name {
            font-size: 15px;
            font-weight: 700;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: baseline;
        }

        .participant-status {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 3px;
            background: #10b981;
        }

        .status-dot.connecting {
            background: #f59e0b;
            animation: pulse 1.2s infinite;
        }

        .participant-badge {
            background: rgba(168,85,247,0.3);
            color: #e0aaff;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 600;
        }

        .action-group {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 30px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            cursor: pointer;
            transition: 0.15s;
        }

        .icon-btn.send {
            background: rgba(168,85,247,0.3);
            color: #e2b0ff;
        }

        .icon-btn.kick {
            background: rgba(239,68,68,0.2);
            color: #f87171;
        }

        /* файлы */
        .file-zone {
            background: rgba(255,255,255,0.04);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 1.8rem;
            padding: 28px 16px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 24px;
            transition: 0.2s;
        }

        .file-zone.drag-over {
            border-color: #a855f7;
            background: rgba(168,85,247,0.15);
        }

        .send-btn {
            margin-bottom: 20px;
            box-shadow: none;
        }

        .files-list, .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .file-card, .history-card {
            background: rgba(35, 35, 55, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 1.4rem;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .file-icon {
            width: 44px;
            height: 44px;
            background: rgba(168,85,247,0.2);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .file-details {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
        }

        .mini-btn {
            width: 38px;
            height: 38px;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            border: none;
            color: white;
            cursor: pointer;
        }

        .mini-btn.download {
            background: rgba(168,85,247,0.3);
            color: #f0abfc;
        }

        .bottom-bar {
            padding: 14px 20px;
            background: rgba(8, 8, 20, 0.7);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: center;
        }

        .leave-btn {
            background: rgba(239,68,68,0.2);
            border: 1px solid rgba(239,68,68,0.4);
            border-radius: 40px;
            padding: 12px 28px;
            color: #f87171;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        /* Модальное окно полученного файла */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-card {
            background: rgba(20,20,45,0.95);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            width: 280px;
            padding: 24px 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }
        .modal-card i {
            font-size: 48px;
            color: #a855f7;
            margin-bottom: 16px;
        }
        .modal-card h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }
        .modal-card p {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 20px;
            word-break: break-all;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .modal-btn {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .modal-btn.download {
            background: linear-gradient(135deg, #a855f7, #ec489a);
            color: white;
        }
        .modal-btn.close {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transition: 0.2s;
            z-index: 1500;
            white-space: nowrap;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-6px);
        }

        .loading {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            flex-direction: column;
            gap: 16px;
        }
        .spinner {
            width: 42px;
            height: 42px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #a855f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: rgba(255,255,255,0.4);
        }
        @media (max-width: 480px) {
            .home-screen { padding: 20px; gap: 32px; }
            .logo-icon { width: 70px; height: 70px; }
            .logo h1 { font-size: 30px; }
            .participant-card { padding: 10px; gap: 10px; }
            .participant-avatar { width: 42px; height: 42px; font-size: 16px; }
            .participant-name { font-size: 14px; }
            .icon-btn { width: 38px; height: 38px; }
            .tab { font-size: 12px; padding: 8px; }
            .room-code-display { font-size: 18px; }
            .action-btn { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>
<div class="loading" id="loading"><div class="spinner"></div><div>Подключение...</div></div>
<div class="conn-status" id="connStatus" style="display: none;"><div class="conn-dot offline"></div><span>Офлайн</span></div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="fileModal"><div class="modal-card"><i class="fas fa-file-alt"></i><h3>Файл получен</h3><p id="modalFileName"></p><div class="modal-buttons"><button class="modal-btn download" id="modalDownloadBtn"><i class="fas fa-download"></i> Скачать</button><button class="modal-btn close" id="modalCloseBtn">Закрыть</button></div></div></div>

<div class="app" id="app">
    <div class="screen home-screen active" id="homeScreen">
        <div class="logo"><div class="logo-icon"><i class="fas fa-bolt"></i></div><h1>DropShare</h1><p>Мгновенный обмен файлами</p></div>
        <div class="action-cards">
            <div class="create-card"><button class="create-btn" onclick="createRoom()"><i class="fas fa-plus-circle"></i> Создать комнату</button></div>
            <div class="divider">или введите код</div>
            <div class="join-card">
                <input type="text" class="join-input" id="roomCode" placeholder="XXXXXXXX" maxlength="8" onkeypress="if(event.key=='Enter') joinRoom()">
                <button class="join-btn" onclick="joinRoom()"><i class="fas fa-sign-in-alt"></i> Присоединиться</button>
                <div style="margin-top: 12px;"><button class="join-btn" onclick="joinFromUrl()" style="background: rgba(168,85,247,0.2);"><i class="fas fa-link"></i> Открыть по ссылке</button></div>
            </div>
        </div>
        <div class="badge"><span><i class="fas fa-shield-alt"></i> P2P шифрование</span><span><i class="fas fa-bolt"></i> Мгновенно</span><span><i class="fas fa-mobile-alt"></i> Без регистрации</span></div>
    </div>

    <div class="screen main-screen" id="mainScreen">
        <div class="header">
            <div class="room-info"><div class="room-label">Код комнаты</div><div class="room-code-display" id="currentRoomCode">------</div></div>
            <div class="room-actions"><button class="action-btn" onclick="copyRoomCode()"><i class="fas fa-copy"></i></button><button class="action-btn" onclick="shareRoomLink()"><i class="fas fa-share-alt"></i></button></div>
        </div>
        <div class="tabs"><button class="tab active" onclick="switchTab('users')"><i class="fas fa-users"></i> Участники</button><button class="tab" onclick="switchTab('files')"><i class="fas fa-folder"></i> Файлы</button><button class="tab" onclick="switchTab('history')"><i class="fas fa-clock"></i> История</button></div>
        <div class="tab-content active scrollable" id="usersTab"><div class="participants-list" id="participantsList"></div></div>
        <div class="tab-content scrollable" id="filesTab"><button class="send-btn" onclick="document.getElementById('fileInput').click()"><i class="fas fa-cloud-upload-alt"></i> Отправить файл (всем)</button><input type="file" id="fileInput" style="display:none" onchange="handleGlobalFiles(this.files)"><div class="file-zone" id="fileZone" onclick="document.getElementById('fileInput').click()"><i class="fas fa-cloud-upload-alt"></i><p>Перетащите файл</p><div class="small">или нажмите</div></div><div class="files-list" id="filesList"></div></div>
        <div class="tab-content scrollable" id="historyTab"><div class="history-list" id="historyList"></div></div>
        <div class="bottom-bar"><button class="leave-btn" onclick="leaveRoom()"><i class="fas fa-sign-out-alt"></i> Выйти</button></div>
    </div>
</div>

<script>
    const API_URL = "https://functions.yandexcloud.net/d4etraj6pl3ep8uj8cd8";
    const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' },{ urls: 'stun:stun1.l.google.com:19302' },{ urls: 'turn:openrelay.metered.ca:80', username:'openrelayproject',credential:'openrelayproject'},{ urls: 'turn:openrelay.metered.ca:443', username:'openrelayproject',credential:'openrelayproject'}] };
    const state = { userId: null, userName: null, roomId: null, roomOwner: false, peerConnections: {}, dataChannels: {}, participants: [], files: [], transfers: [], activeTransfers: {}, pendingFiles: {}, sendingQueue: {}, sendingInProgress: {}, pendingCandidates: {}, processedSignals: new Set(), lastPollTime: 0, chunkSize: 16384, updateInterval: null, signalInterval: null, modalResolve: null, pendingFileBlob: null };
    const fileStore = localforage.createInstance({ name: "DropShare", storeName: "files" });
    const historyStore = localforage.createInstance({ name: "DropShare", storeName: "history" });

    document.addEventListener('DOMContentLoaded', async () => { await init(); checkUrlRoom(); setupDragAndDrop(); });
    async function init() { state.userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8); state.userName = generateShortName(); await loadFiles(); await loadHistory(); setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 700); }
    function generateShortName() { const list = ['Макс','Анна','Кэт','Ник','Тим','Ли','Дэн','Мия','Зоя','Лев','Ром','Ким','Джи','Эмма','Джо']; return `${list[Math.floor(Math.random()*list.length)]}${Math.random().toString(36).substring(2,5).toUpperCase()}`; }
    function showToast(msg, dur=2500) { const t = document.getElementById('toast'); t.innerHTML = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), dur); }
    function showFileReceivedModal(fileName, blob, fileType) { const modal = document.getElementById('fileModal'); const nameSpan = document.getElementById('modalFileName'); nameSpan.innerText = fileName; modal.classList.add('active'); let downloadCallback = null; const downloadBtn = document.getElementById('modalDownloadBtn'); const closeBtn = document.getElementById('modalCloseBtn'); const newHandler = () => { const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = fileName; a.click(); URL.revokeObjectURL(url); modal.classList.remove('active'); }; downloadBtn.onclick = newHandler; closeBtn.onclick = () => { modal.classList.remove('active'); }; modal.onclick = (e) => { if(e.target === modal) modal.classList.remove('active'); }; }
    function setupDragAndDrop() { const zone = document.getElementById('fileZone'); if(zone){ zone.addEventListener('dragover',(e)=>{e.preventDefault();zone.classList.add('drag-over');}); zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over')); zone.addEventListener('drop',(e)=>{e.preventDefault();zone.classList.remove('drag-over');handleGlobalFiles(e.dataTransfer.files);}); } }
    async function loadFiles() { const keys = await fileStore.keys(); state.files = []; for(const key of keys){ const f=await fileStore.getItem(key); if(f) state.files.push(f); } renderFiles(); }
    async function loadHistory() { const hist = await historyStore.getItem('transfers'); if(hist) state.transfers = hist; renderHistory(); }
    async function saveFile(fileData) { await fileStore.setItem(fileData.id, fileData); state.files.push(fileData); renderFiles(); }
    async function saveTransfer(transfer) { state.transfers.unshift(transfer); if(state.transfers.length>80) state.transfers.pop(); await historyStore.setItem('transfers', state.transfers); renderHistory(); }
    function renderFiles() { const cont = document.getElementById('filesList'); if(!cont) return; if(state.files.length===0){ cont.innerHTML='<div class="empty-state"><i class="fas fa-folder-open"></i><p>Нет сохранённых файлов</p></div>'; return; } cont.innerHTML=state.files.map(f=>`<div class="file-card"><div class="file-icon"><i class="fas ${getFileIcon(f.type)}"></i></div><div class="file-details"><div class="file-name">${escapeHtml(f.name)}</div><div class="file-meta">${formatSize(f.size)}</div></div><div class="file-actions"><button class="mini-btn download" onclick="downloadLocalFile('${f.id}')"><i class="fas fa-download"></i></button><button class="mini-btn delete" onclick="deleteLocalFile('${f.id}')"><i class="fas fa-trash"></i></button></div></div>`).join(''); }
    function renderHistory() { const cont=document.getElementById('historyList'); if(!cont) return; if(state.transfers.length===0){ cont.innerHTML='<div class="empty-state"><i class="fas fa-history"></i><p>История пуста</p></div>'; return; } cont.innerHTML=state.transfers.map(t=>`<div class="history-card"><div class="file-icon"><i class="fas ${t.type==='sent'?'fa-arrow-up':'fa-arrow-down'}"></i></div><div class="file-details"><div class="file-name">${escapeHtml(t.fileName)}</div><div class="file-meta">${formatSize(t.fileSize)} • ${t.type==='sent'?'Отправлено':'Получено'} ${new Date(t.timestamp).toLocaleTimeString()}</div></div></div>`).join(''); }
    function renderParticipants() { const cont=document.getElementById('participantsList'); if(!cont) return; if(state.participants.length===0){ cont.innerHTML='<div class="empty-state"><i class="fas fa-users"></i><p>Ожидание участников...</p></div>'; return; } cont.innerHTML=state.participants.map(p=>{ const isMe=p.id===state.userId; const isConnected=state.dataChannels[p.id]?.readyState==='open'; return `<div class="participant-card ${isMe?'me':''}"><div class="participant-avatar" style="background:${getColor(p.id)}">${(p.name||p.id).slice(0,2).toUpperCase()}</div><div class="participant-info"><div class="participant-name">${escapeHtml(p.name||p.id)} ${isMe?'(Вы)':''} ${p.isOwner?'<span class="participant-badge">Создатель</span>':''}</div><div class="participant-status"><div class="status-dot ${isConnected?'':'connecting'}"></div>${isConnected?'Соединён':'подключение...'}</div></div>${!isMe?`<div class="action-group"><button class="icon-btn send" onclick="selectFileForUser('${p.id}','${escapeHtml(p.name)}')" ${!isConnected?'disabled style="opacity:0.5"':''}><i class="fas fa-paper-plane"></i></button>${state.roomOwner?`<button class="icon-btn kick" onclick="kickParticipant('${p.id}')"><i class="fas fa-user-slash"></i></button>`:''}</div></div>`:''}`).join(''); }
    let selectedUserId=null; function selectFileForUser(uid,uname){ selectedUserId=uid; document.getElementById('fileInput').click(); }
    async function handleGlobalFiles(files){ if(!files||!files.length) return; const file=files[0]; if(selectedUserId){ await sendFileToUser(file,selectedUserId); selectedUserId=null; }else{ const peers=Object.keys(state.dataChannels).filter(id=>state.dataChannels[id]?.readyState==='open'); if(!peers.length){ showToast('Нет активных подключений'); return; } peers.forEach(pid=>sendFileToUser(file,pid)); } }
    async function sendFileToUser(file,targetId){ const dc=state.dataChannels[targetId]; if(!dc||dc.readyState!=='open'){ if(!state.pendingFiles[targetId]) state.pendingFiles[targetId]=[]; state.pendingFiles[targetId].push(file); showToast('Ожидание соединения...'); return; } const fileId=Date.now()+'_'+Math.random().toString(36).substr(2,8); showToast(`Отправка: ${file.name}`); if(!state.sendingQueue[targetId]) state.sendingQueue[targetId]=[]; state.sendingQueue[targetId].push({fileId,file,targetId}); processSendQueue(targetId); }
    async function processSendQueue(targetId){ if(state.sendingInProgress[targetId]) return; if(!state.sendingQueue[targetId]?.length) return; state.sendingInProgress[targetId]=true; const {fileId,file}=state.sendingQueue[targetId].shift(); const dc=state.dataChannels[targetId]; const totalChunks=Math.ceil(file.size/state.chunkSize); let offset=0,chunkIndex=0; const sendNext=()=>{ if(offset>=file.size){ delete state.sendingInProgress[targetId]; saveTransfer({type:'sent',fileName:file.name,fileSize:file.size,timestamp:Date.now()}); processSendQueue(targetId); return; } const chunk=file.slice(offset,offset+state.chunkSize); const reader=new FileReader(); reader.onload=(e)=>{ const chunkData=Array.from(new Uint8Array(e.target.result)); const msg=JSON.stringify({type:'file_chunk',fileId,fileName:file.name,fileSize:file.size,fileType:file.type,chunkIndex,totalChunks,data:chunkData}); if(dc.bufferedAmount>65536){ dc.onbufferedamountlow=()=>{ dc.onbufferedamountlow=null; dc.send(msg); offset+=state.chunkSize; chunkIndex++; sendNext(); }; }else{ dc.send(msg); offset+=state.chunkSize; chunkIndex++; sendNext(); } }; reader.readAsArrayBuffer(chunk); }; sendNext(); }
    async function handleFileChunk(data,fromId){ const id=data.fileId; if(!state.activeTransfers[id]){ state.activeTransfers[id]={ fileName:data.fileName, fileSize:data.fileSize, fileType:data.fileType, chunks:new Array(data.totalChunks), received:0, total:data.totalChunks }; } const t=state.activeTransfers[id]; t.chunks[data.chunkIndex]=new Uint8Array(data.data); t.received++; if(t.received===t.total){ let size=0; for(const c of t.chunks) size+=c.length; const full=new Uint8Array(size); let off=0; for(const c of t.chunks){ full.set(c,off); off+=c.length; } const blob=new Blob([full],{type:t.fileType}); await saveFile({ id, name:t.fileName, size:t.fileSize, type:t.fileType, data:Array.from(full), savedAt:Date.now() }); await saveTransfer({ type:'received', from:fromId, fileName:t.fileName, fileSize:t.fileSize, timestamp:Date.now() }); showFileReceivedModal(t.fileName, blob, t.fileType); delete state.activeTransfers[id]; } }
    async function createRoom(){ showLoading(); try{ const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'createRoom',userId:state.userId,userName:state.userName,length:8})}); const data=await res.json(); if(data.success){ state.roomId=data.roomId; state.roomOwner=true; await startSession(); copyRoomCode(); showToast('Комната создана!'); }else throw new Error(); }catch(e){ showToast('Ошибка создания'); }finally{ hideLoading(); } }
    async function joinRoom(){ const code=document.getElementById('roomCode').value.trim().toUpperCase(); if(!code||code.length<6){ showToast('Введите код (6-8 символов)'); return; } showLoading(); try{ const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'joinRoom',roomId:code,userId:state.userId,userName:state.userName})}); const data=await res.json(); if(data.success){ state.roomId=code; state.roomOwner=false; await startSession(); showToast('Подключено!'); }else throw new Error(); }catch(e){ showToast('Ошибка подключения'); }finally{ hideLoading(); } }
    async function startSession(){ document.getElementById('homeScreen').classList.remove('active'); document.getElementById('mainScreen').classList.add('active'); document.getElementById('currentRoomCode').textContent=state.roomId; startUpdates(); await updateParticipants(); }
    async function copyRoomCode(){ await navigator.clipboard.writeText(state.roomId); showToast('Код скопирован'); }
    async function shareRoomLink(){ const url=`${window.location.origin}${window.location.pathname}?room=${state.roomId}`; if(navigator.share) await navigator.share({title:'DropShare',text:`Присоединяйся к комнате ${state.roomId}`,url}); else await navigator.clipboard.writeText(url); showToast('Ссылка скопирована'); }
    function checkUrlRoom(){ const params=new URLSearchParams(window.location.search); const room=params.get('room'); if(room&&room.length>=6){ document.getElementById('roomCode').value=room.toUpperCase(); setTimeout(()=>joinRoom(),300); } }
    function startUpdates(){ if(state.updateInterval)clearInterval(state.updateInterval); if(state.signalInterval)clearInterval(state.signalInterval); state.updateInterval=setInterval(updateParticipants,3000); state.signalInterval=setInterval(pollSignals,1000); setTimeout(()=>{ updateParticipants(); pollSignals(); },500); }
    async function updateParticipants(){ if(!state.roomId) return; try{ const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'getParticipants',roomId:state.roomId,userId:state.userId})}); const data=await res.json(); if(data.success){ const old=state.participants.map(p=>p.id); const newIds=data.participants.map(p=>p.id); state.participants=data.participants; if(JSON.stringify(old)!==JSON.stringify(newIds)){ renderParticipants(); connectToNewParticipants(old,newIds); } } }catch(e){} }
    function connectToNewParticipants(oldList,newList){ const newPeers=newList.filter(id=>id!==state.userId&&!oldList.includes(id)&&!state.peerConnections[id]); newPeers.forEach(peerId=>createPeerConnection(peerId)); Object.keys(state.peerConnections).forEach(peerId=>{ if(!newList.includes(peerId)&&peerId!==state.userId) cleanupPeerConnection(peerId); }); }
    async function createPeerConnection(peerId){ if(state.peerConnections[peerId]) return; const pc=new RTCPeerConnection(config); state.peerConnections[peerId]=pc; const dc=pc.createDataChannel('fileTransfer'); setupDataChannel(dc,peerId); state.dataChannels[peerId]=dc; pc.onicecandidate=e=>{ if(e.candidate) sendSignal(peerId,'candidate',e.candidate); }; pc.ondatachannel=e=>{ setupDataChannel(e.channel,peerId); state.dataChannels[peerId]=e.channel; }; if(state.userId<peerId){ setTimeout(async()=>{ const offer=await pc.createOffer(); await pc.setLocalDescription(offer); await sendSignal(peerId,'offer',offer); },300); } }
    function setupDataChannel(channel,peerId){ channel.onopen=()=>{ renderParticipants(); if(state.pendingFiles[peerId]?.length){ state.pendingFiles[peerId].forEach(f=>sendFileToUser(f,peerId)); delete state.pendingFiles[peerId]; } }; channel.onmessage=async(e)=>{ const data=JSON.parse(e.data); if(data.type==='file_chunk') await handleFileChunk(data,peerId); }; }
    async function pollSignals(){ if(!state.roomId) return; try{ const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'getSignals',roomId:state.roomId,userId:state.userId,timestamp:state.lastPollTime})}); const data=await res.json(); if(data.success&&data.signals?.length){ state.lastPollTime=Date.now(); for(const s of data.signals) await handleSignal(s); } }catch(e){} }
    async function handleSignal(signal){ const id=`${signal.from}_${signal.type}_${Date.now()}`; if(state.processedSignals.has(id)||signal.from===state.userId) return; state.processedSignals.add(id); if(signal.type==='offer') await handleOffer(signal.from,signal.data); else if(signal.type==='answer') await handleAnswer(signal.from,signal.data); else if(signal.type==='candidate') await handleCandidate(signal.from,signal.data); else if(signal.type==='kicked'&&signal.to===state.userId){ showToast('Вас удалили'); leaveRoom(); } }
    async function sendSignal(to,type,data){ if(!state.roomId) return; await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'signal',roomId:state.roomId,userId:state.userId,signal:{to,type,data}})}); }
    async function handleOffer(peerId,offer){ let pc=state.peerConnections[peerId]; if(!pc){ pc=new RTCPeerConnection(config); state.peerConnections[peerId]=pc; pc.onicecandidate=e=>{ if(e.candidate) sendSignal(peerId,'candidate',e.candidate); }; pc.ondatachannel=e=>{ setupDataChannel(e.channel,peerId); state.dataChannels[peerId]=e.channel; }; } await pc.setRemoteDescription(new RTCSessionDescription(offer)); const answer=await pc.createAnswer(); await pc.setLocalDescription(answer); await sendSignal(peerId,'answer',answer); if(state.pendingCandidates[peerId]){ for(const c of state.pendingCandidates[peerId]) try{ await pc.addIceCandidate(new RTCIceCandidate(c)); }catch(e){} delete state.pendingCandidates[peerId]; } }
    async function handleAnswer(peerId,answer){ const pc=state.peerConnections[peerId]; if(pc&&pc.signalingState==='have-local-offer') await pc.setRemoteDescription(new RTCSessionDescription(answer)); }
    async function handleCandidate(peerId,candidate){ const pc=state.peerConnections[peerId]; if(!pc||!pc.remoteDescription){ if(!state.pendingCandidates[peerId]) state.pendingCandidates[peerId]=[]; state.pendingCandidates[peerId].push(candidate); return; } try{ await pc.addIceCandidate(new RTCIceCandidate(candidate)); }catch(e){} }
    async function kickParticipant(id){ if(!confirm('Удалить участника?')) return; await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'kickParticipant',roomId:state.roomId,userId:state.userId,participantId:id})}); showToast('Участник удалён'); cleanupPeerConnection(id); }
    function cleanupPeerConnection(peerId){ if(state.peerConnections[peerId]){ state.peerConnections[peerId].close(); delete state.peerConnections[peerId]; } delete state.dataChannels[peerId]; delete state.pendingFiles[peerId]; delete state.sendingQueue[peerId]; delete state.sendingInProgress[peerId]; }
    async function leaveRoom(){ if(!confirm('Выйти из комнаты?')) return; if(state.roomId) await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'leaveRoom',roomId:state.roomId,userId:state.userId})}); cleanup(); document.getElementById('mainScreen').classList.remove('active'); document.getElementById('homeScreen').classList.add('active'); document.getElementById('roomCode').value=''; showToast('Вы вышли'); }
    function cleanup(){ if(state.updateInterval)clearInterval(state.updateInterval); if(state.signalInterval)clearInterval(state.signalInterval); Object.values(state.peerConnections).forEach(pc=>pc.close()); state.peerConnections={}; state.dataChannels={}; state.activeTransfers={}; state.pendingFiles={}; state.sendingQueue={}; state.sendingInProgress={}; state.pendingCandidates={}; state.processedSignals.clear(); state.roomId=null; state.roomOwner=false; }
    function downloadLocalFile(id){ const file=state.files.find(f=>f.id===id); if(!file) return; const blob=new Blob([new Uint8Array(file.data)],{type:file.type}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=file.name; a.click(); URL.revokeObjectURL(url); }
    async function deleteLocalFile(id){ if(!confirm('Удалить файл?')) return; await fileStore.removeItem(id); state.files=state.files.filter(f=>f.id!==id); renderFiles(); showToast('Файл удалён'); }
    function switchTab(tab){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); if(tab==='users'){ document.querySelector('.tab:first-child').classList.add('active'); document.getElementById('usersTab').classList.add('active'); }else if(tab==='files'){ document.querySelector('.tab:nth-child(2)').classList.add('active'); document.getElementById('filesTab').classList.add('active'); }else{ document.querySelector('.tab:nth-child(3)').classList.add('active'); document.getElementById('historyTab').classList.add('active'); } }
    function getFileIcon(type){ if(type?.startsWith('image/')) return 'fa-image'; if(type?.startsWith('video/')) return 'fa-video'; return 'fa-file'; }
    function formatSize(bytes){ if(!bytes) return '0 B'; const k=1024; const sizes=['B','KB','MB','GB']; const i=Math.floor(Math.log(bytes)/Math.log(k)); return parseFloat((bytes/Math.pow(k,i)).toFixed(1))+' '+sizes[i]; }
    function escapeHtml(s){ const div=document.createElement('div'); div.textContent=s; return div.innerHTML; }
    function getColor(id){ let hash=0; for(let i=0;i<id.length;i++) hash=((hash<<5)-hash)+id.charCodeAt(i); const colors=['#a855f7','#ec489a','#f59e0b','#10b981','#3b82f6']; return colors[Math.abs(hash)%colors.length]; }
    function showLoading(t='Подключение...'){ document.getElementById('loading').style.display='flex'; document.getElementById('loadingText')?document.getElementById('loadingText').textContent=t:null; }
    function hideLoading(){ document.getElementById('loading').style.display='none'; }
    document.getElementById('roomCode')?.addEventListener('input',function(){ this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'').substring(0,8); });
    window.joinFromUrl=()=>{ const urlRoom=prompt('Вставьте ссылку или код комнаты'); if(urlRoom){ let code=urlRoom.trim(); if(code.includes('room=')) code=code.split('room=')[1].split('&')[0]; if(code.length>=6){ document.getElementById('roomCode').value=code.toUpperCase(); joinRoom(); }else showToast('Неверный код'); } };
</script>
