<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DropShare • P2P файлы</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Современный шрифт Manrope с поддержкой кириллицы -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Обновлённый градиент — яркий фиолетово-розовый */
        .gradient-bg {
            background: linear-gradient(135deg, #a855f7 0%, #ec489a 100%);
        }

        .scrollable {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

        .scrollable::-webkit-scrollbar {
            width: 4px;
        }

        .scrollable::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .scrollable::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        .app {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            background: linear-gradient(145deg, #0a0a0a 0%, #0f0f0f 100%);
        }

        .screen {
            flex: 1;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Главный экран */
        .home-screen {
            padding: 24px 20px;
            align-items: center;
            justify-content: center;
            gap: 48px;
        }

        .logo {
            text-align: center;
            animation: slideUp 0.5s ease;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #a855f7, #ec489a);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 20px 35px -12px rgba(168,85,247,0.4);
        }

        .logo-icon i {
            font-size: 40px;
            color: white;
        }

        .logo h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #f0abfc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .logo p {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            font-weight: 500;
        }

        .action-cards {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .create-card, .join-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .create-card {
            background: linear-gradient(135deg, rgba(168,85,247,0.15), rgba(236,72,153,0.15));
            border: 1px solid rgba(168,85,247,0.4);
        }

        .create-btn {
            width: 100%;
            background: linear-gradient(135deg, #a855f7, #ec489a);
            border: none;
            border-radius: 20px;
            padding: 16px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(168,85,247,0.4);
        }

        .create-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(168,85,247,0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            margin: 16px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }

        .join-input {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 16px 20px;
            color: white;
            font-size: 16px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 2px;
            outline: none;
            transition: all 0.2s;
        }

        .join-input:focus {
            border-color: #a855f7;
            background: rgba(255,255,255,0.12);
        }

        .join-input::placeholder {
            color: rgba(255,255,255,0.4);
            letter-spacing: normal;
        }

        .join-btn {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 14px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .join-btn:active {
            background: rgba(255,255,255,0.15);
            transform: scale(0.98);
        }

        .badge {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            justify-content: center;
            color: rgba(255,255,255,0.3);
            font-size: 11px;
            font-weight: 500;
        }

        /* Основной экран */
        .main-screen {
            background: #0a0a0a;
        }

        .header {
            padding: 16px 20px;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .room-info {
            flex: 1;
        }

        .room-label {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .room-code-display {
            font-size: 22px;
            font-weight: 800;
            font-family: 'Manrope', monospace;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff, #f0abfc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .room-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .action-btn:active {
            transform: scale(0.94);
            background: rgba(255,255,255,0.15);
        }

        .tabs {
            display: flex;
            padding: 8px 16px;
            gap: 8px;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: sticky;
            top: 73px;
            z-index: 10;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.04);
            border: none;
            border-radius: 60px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab i {
            font-size: 14px;
        }

        .tab.active {
            background: linear-gradient(135deg, #a855f7, #ec489a);
            color: white;
            box-shadow: 0 4px 12px rgba(168,85,247,0.4);
        }

        .tab-content {
            flex: 1;
            display: none;
            padding: 20px;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        .participants-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .participant-card {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .participant-card.me {
            background: linear-gradient(135deg, rgba(168,85,247,0.1), rgba(236,72,153,0.1));
            border-color: rgba(168,85,247,0.4);
        }

        .participant-avatar {
            width: 52px;
            height: 52px;
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            flex-shrink: 0;
            background: linear-gradient(135deg, #a855f7, #ec489a);
        }

        .participant-info {
            flex: 1;
        }

        .participant-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .participant-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            font-weight: 500;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 3px;
            background: #10b981;
        }

        .status-dot.connecting {
            background: #f59e0b;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .participant-badge {
            background: rgba(168,85,247,0.2);
            color: #f0abfc;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
        }

        .action-group {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: rgba(255,255,255,0.08);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .icon-btn:active {
            transform: scale(0.92);
        }

        .icon-btn.send {
            background: rgba(168,85,247,0.2);
            color: #f0abfc;
        }

        .icon-btn.kick {
            background: rgba(239,68,68,0.15);
            color: #f87171;
        }

        .file-zone {
            background: rgba(255,255,255,0.04);
            border: 2px dashed rgba(255,255,255,0.15);
            border-radius: 28px;
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 24px;
        }

        .file-zone.drag-over {
            border-color: #a855f7;
            background: rgba(168,85,247,0.1);
            transform: scale(0.98);
        }

        .file-zone i {
            font-size: 48px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 12px;
        }

        .file-zone p {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            font-weight: 500;
        }

        .file-zone .small {
            font-size: 12px;
            margin-top: 8px;
            color: rgba(255,255,255,0.3);
        }

        .send-btn {
            width: 100%;
            background: linear-gradient(135deg, #a855f7, #ec489a);
            border: none;
            border-radius: 60px;
            padding: 16px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .files-list, .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .file-card, .history-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
        }

        .file-icon {
            width: 48px;
            height: 48px;
            background: rgba(168,85,247,0.15);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #f0abfc;
        }

        .file-details {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            display: flex;
            gap: 12px;
            font-weight: 500;
        }

        .file-actions {
            display: flex;
            gap: 8px;
        }

        .mini-btn {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
        }

        .mini-btn.download {
            background: rgba(168,85,247,0.2);
            color: #f0abfc;
        }

        .mini-btn.delete {
            background: rgba(239,68,68,0.15);
            color: #f87171;
        }

        .progress-bar {
            margin-top: 8px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #a855f7, #ec489a);
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s;
        }

        .bottom-bar {
            padding: 16px 20px;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: center;
        }

        .leave-btn {
            background: rgba(239,68,68,0.2);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 60px;
            padding: 14px 28px;
            color: #f87171;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .leave-btn:active {
            transform: scale(0.96);
            background: rgba(239,68,68,0.3);
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            padding: 14px 24px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 2000;
            white-space: nowrap;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #a855f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .conn-status {
            position: fixed;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: 500;
        }

        .conn-dot {
            width: 8px;
            height: 8px;
            border-radius: 4px;
        }

        .conn-dot.online {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }

        .conn-dot.offline {
            background: #ef4444;
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: rgba(255,255,255,0.3);
        }

        .empty-state i {
            font-size: 56px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 14px;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .home-screen { padding: 20px 16px; }
            .logo-icon { width: 70px; height: 70px; border-radius: 24px; }
            .logo-icon i { font-size: 32px; }
            .logo h1 { font-size: 32px; }
            .action-cards { max-width: 100%; }
            .participant-card { padding: 12px; }
            .participant-avatar { width: 44px; height: 44px; font-size: 16px; }
            .tab { padding: 10px; font-size: 13px; }
            .tab-content { padding: 16px; }
            .room-code-display { font-size: 18px; }
            .toast { white-space: normal; max-width: 80%; text-align: center; padding: 12px 20px; }
            .icon-btn { width: 40px; height: 40px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div id="loadingText">Подключение...</div>
    </div>

    <div class="conn-status" id="connStatus" style="display: none;">
        <div class="conn-dot offline"></div>
        <span>Офлайн</span>
    </div>

    <div class="toast" id="toast"></div>

    <div class="app" id="app">
        <div class="screen home-screen active" id="homeScreen">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-bolt"></i>
                </div>
                <h1>DropShare</h1>
                <p>Мгновенный обмен файлами</p>
            </div>

            <div class="action-cards">
                <div class="create-card">
                    <button class="create-btn" onclick="createRoom()">
                        <i class="fas fa-plus-circle"></i>
                        Создать комнату
                    </button>
                </div>

                <div class="divider">или введите код</div>

                <div class="join-card">
                    <input type="text" class="join-input" id="roomCode" 
                           placeholder="XXXXXX" maxlength="6" 
                           onkeypress="if(event.key=='Enter') joinRoom()">
                    <button class="join-btn" onclick="joinRoom()">
                        <i class="fas fa-sign-in-alt"></i>
                        Присоединиться
                    </button>
                </div>
            </div>

            <div class="badge">
                <span><i class="fas fa-shield-alt"></i> P2P шифрование</span>
                <span><i class="fas fa-bolt"></i> Мгновенно</span>
                <span><i class="fas fa-mobile-alt"></i> Без регистрации</span>
            </div>
        </div>

        <div class="screen main-screen" id="mainScreen">
            <div class="header">
                <div class="room-info">
                    <div class="room-label">Код комнаты</div>
                    <div class="room-code-display" id="currentRoomCode">------</div>
                </div>
                <div class="room-actions">
                    <button class="action-btn" onclick="copyRoomCode()">
                        <i class="fas fa-copy"></i>
                    </button>
                    <button class="action-btn share" onclick="shareRoomCode()">
                        <i class="fas fa-share-alt"></i>
                    </button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('users')">
                    <i class="fas fa-users"></i> Участники
                </button>
                <button class="tab" onclick="switchTab('files')">
                    <i class="fas fa-folder"></i> Файлы
                </button>
                <button class="tab" onclick="switchTab('history')">
                    <i class="fas fa-clock"></i> История
                </button>
            </div>

            <div class="tab-content active scrollable" id="usersTab">
                <div class="participants-list" id="participantsList"></div>
            </div>

            <div class="tab-content scrollable" id="filesTab">
                <button class="send-btn" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-cloud-upload-alt"></i> Выбрать файл (всем)
                </button>
                <input type="file" id="fileInput" style="display: none" onchange="handleFiles(this.files)">
                
                <div class="file-zone" id="fileZone" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Перетащите файл сюда</p>
                    <div class="small">или нажмите для выбора</div>
                </div>

                <div class="files-list" id="filesList"></div>
            </div>

            <div class="tab-content scrollable" id="historyTab">
                <div class="history-list" id="historyList"></div>
            </div>

            <div class="bottom-bar">
                <button class="leave-btn" onclick="leaveRoom()">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://functions.yandexcloud.net/d4etraj6pl3ep8uj8cd8";

        const config = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' },
                { 
                    urls: 'turn:openrelay.metered.ca:80',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                },
                { 
                    urls: 'turn:openrelay.metered.ca:443',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                }
            ],
            iceCandidatePoolSize: 10
        };

        const state = {
            userId: null,
            userName: null,
            roomId: null,
            roomOwner: false,
            peerConnections: {},
            dataChannels: {},
            participants: [],
            files: [],
            transfers: [],
            activeTransfers: {},
            pendingFiles: {},
            sendingQueue: {},
            sendingInProgress: {},
            pendingCandidates: {},
            processedSignals: new Set(),
            lastPollTime: 0,
            chunkSize: 16384,
            updateInterval: null,
            signalInterval: null
        };

        const fileStore = localforage.createInstance({ name: "DropShare", storeName: "files" });
        const historyStore = localforage.createInstance({ name: "DropShare", storeName: "history" });

        document.addEventListener('DOMContentLoaded', () => {
            init();
            setupDragAndDrop();
        });

        async function init() {
            state.userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            state.userName = generateShortName();
            
            await loadFiles();
            await loadHistory();
            
            if (!window.RTCPeerConnection) {
                showToast('Ваш браузер не поддерживает P2P передачу', 5000);
                document.getElementById('loadingText').textContent = 'Браузер не поддерживается';
                return;
            }
            
            await checkConnection();
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
            }, 800);
        }

        // Генерация коротких никнеймов с большим количеством комбинаций
        function generateShortName() {
            const shortNames = ['Макс', 'Анна', 'Кэт', 'Ник', 'Тим', 'Ли', 'Дэн', 'Мия', 'Зоя', 'Лев', 'Ром', 'Ким', 'Джи', 'Эмма', 'Джо', 'Ай', 'Ви', 'Тэд', 'Мэй', 'Рэй'];
            const suffix = Math.random().toString(36).substring(2, 5).toUpperCase();
            return `${shortNames[Math.floor(Math.random() * shortNames.length)]}${suffix}`;
        }

        async function checkConnection() {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'ping' })
                });
                updateConnectionStatus(res.ok);
                return res.ok;
            } catch {
                updateConnectionStatus(false);
                return false;
            }
        }

        function updateConnectionStatus(online) {
            const status = document.getElementById('connStatus');
            if (!status) return;
            status.style.display = 'flex';
            const dot = status.querySelector('.conn-dot');
            const text = status.querySelector('span');
            dot.className = online ? 'conn-dot online' : 'conn-dot offline';
            text.textContent = online ? 'Online' : 'Offline';
        }

        function showToast(msg, icon = 'info', duration = 2500) {
            const toast = document.getElementById('toast');
            const iconMap = { info: 'ℹ️', success: '✅', file: '🎉' };
            const prefix = iconMap[icon] || '';
            toast.innerHTML = `${prefix} ${msg}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        function showFileReceivedToast(fileName) {
            showToast(`Файл получен! ${fileName}`, 'file', 3000);
        }

        function showLoading(text = 'Загрузка...') {
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('loadingText').textContent = text;
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        function setupDragAndDrop() {
            const zone = document.getElementById('fileZone');
            if (!zone) return;
            zone.addEventListener('dragover', (e) => {
                e.preventDefault();
                zone.classList.add('drag-over');
            });
            zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('drag-over');
                handleFiles(e.dataTransfer.files);
            });
        }

        async function loadFiles() {
            const keys = await fileStore.keys();
            state.files = [];
            for (const key of keys) {
                const file = await fileStore.getItem(key);
                if (file) state.files.push(file);
            }
            renderFiles();
        }

        async function loadHistory() {
            const history = await historyStore.getItem('transfers');
            if (history) {
                state.transfers = history;
                renderHistory();
            }
        }

        async function saveFile(fileData) {
            await fileStore.setItem(fileData.id, fileData);
            state.files.push(fileData);
            renderFiles();
        }

        async function saveTransfer(transfer) {
            state.transfers.unshift(transfer);
            if (state.transfers.length > 100) state.transfers = state.transfers.slice(0, 100);
            await historyStore.setItem('transfers', state.transfers);
            renderHistory();
        }

        function renderFiles() {
            const container = document.getElementById('filesList');
            if (!container) return;
            if (state.files.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-folder-open"></i><p>Нет сохранённых файлов</p></div>`;
                return;
            }
            container.innerHTML = state.files.map(file => `
                <div class="file-card">
                    <div class="file-icon"><i class="fas ${getFileIcon(file.type)}"></i></div>
                    <div class="file-details">
                        <div class="file-name">${escapeHtml(file.name)}</div>
                        <div class="file-meta">${formatSize(file.size)} • ${new Date(file.savedAt).toLocaleTimeString()}</div>
                    </div>
                    <div class="file-actions">
                        <button class="mini-btn download" onclick="downloadFile('${file.id}')"><i class="fas fa-download"></i></button>
                        <button class="mini-btn delete" onclick="deleteFile('${file.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            if (!container) return;
            if (state.transfers.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-history"></i><p>История пуста</p></div>`;
                return;
            }
            container.innerHTML = state.transfers.map(t => `
                <div class="history-card">
                    <div class="file-icon"><i class="fas ${t.type === 'sent' ? 'fa-arrow-up' : 'fa-arrow-down'}"></i></div>
                    <div class="file-details">
                        <div class="file-name">${escapeHtml(t.fileName)}</div>
                        <div class="file-meta">${formatSize(t.fileSize)} • ${t.type === 'sent' ? 'Отправлено' : 'Получено'} ${new Date(t.timestamp).toLocaleTimeString()}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderParticipants() {
            const container = document.getElementById('participantsList');
            if (!container) return;
            if (state.participants.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-users"></i><p>Ожидание участников...</p></div>`;
                return;
            }
            container.innerHTML = state.participants.map(p => {
                const isMe = p.id === state.userId;
                const channelState = state.dataChannels[p.id]?.readyState;
                const isConnected = channelState === 'open';
                return `
                    <div class="participant-card ${isMe ? 'me' : ''}">
                        <div class="participant-avatar" style="background: ${getColor(p.id)}">${getInitials(p.name || p.id)}</div>
                        <div class="participant-info">
                            <div class="participant-name">
                                ${escapeHtml(p.name || p.id)} ${isMe ? '(Вы)' : ''}
                                ${p.isOwner ? '<span class="participant-badge">Создатель</span>' : ''}
                            </div>
                            <div class="participant-status">
                                <div class="status-dot ${isConnected ? '' : 'connecting'}"></div>
                                ${isConnected ? 'Соединение активно' : 'Подключение...'}
                            </div>
                        </div>
                        ${!isMe ? `
                            <div class="action-group">
                                <button class="icon-btn send" onclick="selectFileForUser('${p.id}', '${escapeHtml(p.name)}')" ${!isConnected ? 'disabled style="opacity:0.5"' : ''}>
                                    <i class="fas fa-file-upload"></i>
                                </button>
                                ${state.roomOwner ? `<button class="icon-btn kick" onclick="kickParticipant('${p.id}')"><i class="fas fa-user-slash"></i></button>` : ''}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        function getFileIcon(type) {
            if (type?.startsWith('image/')) return 'fa-image';
            if (type?.startsWith('video/')) return 'fa-video';
            if (type?.startsWith('audio/')) return 'fa-music';
            return 'fa-file';
        }

        function formatSize(bytes) {
            if (!bytes) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function downloadFile(id) {
            const file = state.files.find(f => f.id === id);
            if (!file) return;
            const blob = new Blob([new Uint8Array(file.data)], { type: file.type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = file.name;
            a.click();
            URL.revokeObjectURL(url);
        }

        async function deleteFile(id) {
            if (!confirm('Удалить файл?')) return;
            await fileStore.removeItem(id);
            state.files = state.files.filter(f => f.id !== id);
            renderFiles();
            showToast('Файл удалён', 'info');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            if (tab === 'users') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('usersTab').classList.add('active');
            } else if (tab === 'files') {
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                document.getElementById('filesTab').classList.add('active');
            } else if (tab === 'history') {
                document.querySelector('.tab:nth-child(3)').classList.add('active');
                document.getElementById('historyTab').classList.add('active');
            }
        }

        async function createRoom() {
            showLoading('Создание комнаты...');
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'createRoom', userId: state.userId, userName: state.userName })
                });
                const data = await res.json();
                if (data.success) {
                    state.roomId = data.roomId;
                    state.roomOwner = true;
                    await startSession();
                    showToast('Комната создана!', 'success');
                    copyRoomCode();
                } else throw new Error(data.error);
            } catch {
                showToast('Ошибка создания', 'info');
            } finally {
                hideLoading();
            }
        }

        async function joinRoom() {
            const code = document.getElementById('roomCode').value.trim().toUpperCase();
            if (!code || code.length !== 6) {
                showToast('Введите 6-значный код', 'info');
                return;
            }
            showLoading('Подключение...');
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'joinRoom', roomId: code, userId: state.userId, userName: state.userName })
                });
                const data = await res.json();
                if (data.success) {
                    state.roomId = code;
                    state.roomOwner = false;
                    await startSession();
                    showToast('Подключено!', 'success');
                } else throw new Error(data.error);
            } catch {
                showToast('Ошибка подключения', 'info');
            } finally {
                hideLoading();
            }
        }

        async function startSession() {
            document.getElementById('homeScreen').classList.remove('active');
            document.getElementById('mainScreen').classList.add('active');
            document.getElementById('currentRoomCode').textContent = state.roomId;
            startUpdates();
            await updateParticipants();
        }

        async function copyRoomCode() {
            await navigator.clipboard.writeText(state.roomId);
            showToast('Код скопирован', 'success');
        }

        async function shareRoomCode() {
            if (navigator.share) {
                await navigator.share({ title: 'DropShare', text: `Код комнаты: ${state.roomId}` });
            } else {
                copyRoomCode();
            }
        }

        function startUpdates() {
            if (state.updateInterval) clearInterval(state.updateInterval);
            if (state.signalInterval) clearInterval(state.signalInterval);
            state.updateInterval = setInterval(updateParticipants, 3000);
            state.signalInterval = setInterval(pollSignals, 1000);
            setTimeout(() => { updateParticipants(); pollSignals(); }, 500);
        }

        async function updateParticipants() {
            if (!state.roomId) return;
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'getParticipants', roomId: state.roomId, userId: state.userId })
                });
                const data = await res.json();
                if (data.success) {
                    const old = state.participants.map(p => p.id);
                    const newIds = data.participants.map(p => p.id);
                    state.participants = data.participants;
                    if (JSON.stringify(old) !== JSON.stringify(newIds)) {
                        renderParticipants();
                        connectToNewParticipants(old, newIds);
                    }
                }
            } catch (e) {}
        }

        function connectToNewParticipants(oldList, newList) {
            const newPeers = newList.filter(id => id !== state.userId && !oldList.includes(id) && !state.peerConnections[id]);
            newPeers.forEach(peerId => createPeerConnection(peerId));
            Object.keys(state.peerConnections).forEach(peerId => {
                if (!newList.includes(peerId) && peerId !== state.userId) cleanupPeerConnection(peerId);
            });
        }

        async function createPeerConnection(peerId) {
            if (state.peerConnections[peerId]) return;
            const pc = new RTCPeerConnection(config);
            state.peerConnections[peerId] = pc;
            
            const dc = pc.createDataChannel('fileTransfer');
            setupDataChannel(dc, peerId);
            state.dataChannels[peerId] = dc;
            
            pc.onicecandidate = (e) => {
                if (e.candidate) sendSignal(peerId, 'candidate', e.candidate);
            };
            
            pc.ondatachannel = (e) => {
                setupDataChannel(e.channel, peerId);
                state.dataChannels[peerId] = e.channel;
            };
            
            if (state.userId < peerId) {
                setTimeout(async () => {
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    await sendSignal(peerId, 'offer', offer);
                }, 500);
            }
        }

        function setupDataChannel(channel, peerId) {
            channel.onopen = () => {
                renderParticipants();
                if (state.pendingFiles[peerId]?.length) {
                    state.pendingFiles[peerId].forEach(f => sendFileToUser(f, peerId));
                    delete state.pendingFiles[peerId];
                }
            };
            channel.onmessage = async (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'file_chunk') await handleFileChunk(data, peerId);
            };
        }

        let selectedUser = null;

        function selectFileForUser(userId, userName) {
            selectedUser = { id: userId, name: userName };
            document.getElementById('fileInput').click();
        }

        async function handleFiles(files) {
            if (!files?.length) return;
            const file = files[0];
            if (selectedUser) {
                await sendFileToUser(file, selectedUser.id);
                selectedUser = null;
            } else {
                const peers = Object.keys(state.dataChannels).filter(id => state.dataChannels[id]?.readyState === 'open');
                if (!peers.length) {
                    showToast('Нет активных подключений', 'info');
                    return;
                }
                peers.forEach(pid => sendFileToUser(file, pid));
            }
        }

        async function sendFileToUser(file, targetId) {
            const dc = state.dataChannels[targetId];
            if (!dc || dc.readyState !== 'open') {
                if (!state.pendingFiles[targetId]) state.pendingFiles[targetId] = [];
                state.pendingFiles[targetId].push(file);
                showToast('Ожидание соединения...', 'info');
                return;
            }
            
            const fileId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            showToast(`Отправка: ${file.name}`, 'info');
            
            if (!state.sendingQueue[targetId]) state.sendingQueue[targetId] = [];
            state.sendingQueue[targetId].push({ fileId, file, targetId });
            processSendQueue(targetId);
        }

        async function processSendQueue(targetId) {
            if (state.sendingInProgress[targetId]) return;
            if (!state.sendingQueue[targetId]?.length) return;
            
            state.sendingInProgress[targetId] = true;
            const { fileId, file } = state.sendingQueue[targetId].shift();
            const dc = state.dataChannels[targetId];
            
            const totalChunks = Math.ceil(file.size / state.chunkSize);
            let offset = 0;
            let chunkIndex = 0;
            
            const sendNext = () => {
                if (offset >= file.size) {
                    delete state.sendingInProgress[targetId];
                    showToast(`Готово: ${file.name}`, 'success');
                    saveTransfer({ type: 'sent', from: state.userId, fileName: file.name, fileSize: file.size, timestamp: Date.now() });
                    processSendQueue(targetId);
                    return;
                }
                
                const chunk = file.slice(offset, offset + state.chunkSize);
                const reader = new FileReader();
                reader.onload = (e) => {
                    const chunkData = Array.from(new Uint8Array(e.target.result));
                    const msg = JSON.stringify({
                        type: 'file_chunk',
                        fileId, fileName: file.name, fileSize: file.size, fileType: file.type,
                        chunkIndex, totalChunks, data: chunkData
                    });
                    
                    if (dc.bufferedAmount > 65536) {
                        dc.onbufferedamountlow = () => {
                            dc.onbufferedamountlow = null;
                            dc.send(msg);
                            offset += state.chunkSize;
                            chunkIndex++;
                            sendNext();
                        };
                    } else {
                        dc.send(msg);
                        offset += state.chunkSize;
                        chunkIndex++;
                        sendNext();
                    }
                };
                reader.readAsArrayBuffer(chunk);
            };
            
            dc.bufferedAmountLowThreshold = 65536;
            sendNext();
        }

        async function handleFileChunk(data, fromId) {
            const id = data.fileId;
            if (!state.activeTransfers[id]) {
                state.activeTransfers[id] = {
                    fileName: data.fileName, fileSize: data.fileSize, fileType: data.fileType,
                    chunks: new Array(data.totalChunks), received: 0, total: data.totalChunks
                };
            }
            
            const t = state.activeTransfers[id];
            t.chunks[data.chunkIndex] = new Uint8Array(data.data);
            t.received++;
            
            if (t.received === t.total) {
                let size = 0;
                for (const c of t.chunks) size += c.length;
                const full = new Uint8Array(size);
                let offset = 0;
                for (const c of t.chunks) { full.set(c, offset); offset += c.length; }
                
                await saveFile({
                    id, name: t.fileName, size: t.fileSize, type: t.fileType,
                    data: Array.from(full), savedAt: Date.now()
                });
                
                const sender = state.participants.find(p => p.id === fromId);
                await saveTransfer({
                    type: 'received', from: fromId, senderName: sender?.name,
                    fileName: t.fileName, fileSize: t.fileSize, timestamp: Date.now()
                });
                
                delete state.activeTransfers[id];
                showFileReceivedToast(t.fileName);
            }
        }

        async function pollSignals() {
            if (!state.roomId) return;
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'getSignals', roomId: state.roomId, userId: state.userId, timestamp: state.lastPollTime })
                });
                const data = await res.json();
                if (data.success && data.signals?.length) {
                    state.lastPollTime = Date.now();
                    for (const s of data.signals) await handleSignal(s);
                }
            } catch (e) {}
        }

        async function handleSignal(signal) {
            const id = `${signal.from}_${signal.type}_${Date.now()}`;
            if (state.processedSignals.has(id) || signal.from === state.userId) return;
            state.processedSignals.add(id);
            
            switch (signal.type) {
                case 'offer': await handleOffer(signal.from, signal.data); break;
                case 'answer': await handleAnswer(signal.from, signal.data); break;
                case 'candidate': await handleCandidate(signal.from, signal.data); break;
                case 'kicked':
                    if (signal.to === state.userId) {
                        showToast('Вас удалили', 'info');
                        leaveRoom();
                    }
                    break;
            }
        }

        async function sendSignal(to, type, data) {
            if (!state.roomId) return;
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'signal', roomId: state.roomId, userId: state.userId, signal: { to, type, data } })
            });
        }

        async function handleOffer(peerId, offer) {
            let pc = state.peerConnections[peerId];
            if (!pc) {
                pc = new RTCPeerConnection(config);
                state.peerConnections[peerId] = pc;
                pc.onicecandidate = (e) => { if (e.candidate) sendSignal(peerId, 'candidate', e.candidate); };
                pc.ondatachannel = (e) => {
                    setupDataChannel(e.channel, peerId);
                    state.dataChannels[peerId] = e.channel;
                };
            }
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await sendSignal(peerId, 'answer', answer);
            if (state.pendingCandidates[peerId]) {
                for (const c of state.pendingCandidates[peerId]) {
                    try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch {}
                }
                delete state.pendingCandidates[peerId];
            }
        }

        async function handleAnswer(peerId, answer) {
            const pc = state.peerConnections[peerId];
            if (pc && pc.signalingState === 'have-local-offer') {
                await pc.setRemoteDescription(new RTCSessionDescription(answer));
            }
        }

        async function handleCandidate(peerId, candidate) {
            const pc = state.peerConnections[peerId];
            if (!pc || !pc.remoteDescription) {
                if (!state.pendingCandidates[peerId]) state.pendingCandidates[peerId] = [];
                state.pendingCandidates[peerId].push(candidate);
                return;
            }
            try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch {}
        }

        async function kickParticipant(id) {
            if (!confirm('Удалить участника?')) return;
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'kickParticipant', roomId: state.roomId, userId: state.userId, participantId: id })
            });
            showToast('Участник удалён', 'info');
            cleanupPeerConnection(id);
        }

        function cleanupPeerConnection(peerId) {
            if (state.peerConnections[peerId]) {
                state.peerConnections[peerId].close();
                delete state.peerConnections[peerId];
            }
            delete state.dataChannels[peerId];
            delete state.pendingFiles[peerId];
            delete state.sendingQueue[peerId];
            delete state.sendingInProgress[peerId];
        }

        async function leaveRoom() {
            if (!confirm('Выйти из комнаты?')) return;
            if (state.roomId) {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'leaveRoom', roomId: state.roomId, userId: state.userId })
                });
            }
            cleanup();
            document.getElementById('mainScreen').classList.remove('active');
            document.getElementById('homeScreen').classList.add('active');
            document.getElementById('roomCode').value = '';
            showToast('Вы вышли', 'info');
        }

        function cleanup() {
            if (state.updateInterval) clearInterval(state.updateInterval);
            if (state.signalInterval) clearInterval(state.signalInterval);
            Object.values(state.peerConnections).forEach(pc => pc.close());
            state.peerConnections = {};
            state.dataChannels = {};
            state.activeTransfers = {};
            state.pendingFiles = {};
            state.sendingQueue = {};
            state.sendingInProgress = {};
            state.pendingCandidates = {};
            state.processedSignals.clear();
            state.roomId = null;
            state.roomOwner = false;
        }

        function getInitials(name) {
            return name.slice(0, 2).toUpperCase();
        }

        function getColor(id) {
            const colors = ['#a855f7', '#ec489a', '#f59e0b', '#10b981', '#3b82f6', '#ef4444', '#8b5cf6', '#ec489a'];
            let hash = 0;
            for (let i = 0; i < id.length; i++) hash = ((hash << 5) - hash) + id.charCodeAt(i);
            return colors[Math.abs(hash) % colors.length];
        }

        document.getElementById('roomCode')?.addEventListener('input', function() {
            this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '').substring(0, 6);
        });
    </script>
</body>
</html>
