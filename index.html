<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Call</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* App Container */
        .app {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .screen {
            flex: 1;
            display: none;
            flex-direction: column;
            background: #000;
        }

        .screen.active {
            display: flex;
        }

        /* Home Screen */
        .home-screen {
            padding: 40px 20px;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }

        .logo {
            text-align: center;
        }

        .logo h1 {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
        }

        .call-actions {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 300px;
        }

        .create-btn {
            width: 100%;
            height: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .create-btn:active {
            transform: scale(0.98);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            color: rgba(255, 255, 255, 0.4);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }

        .join-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .join-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 15px 20px;
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
        }

        .join-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .join-btn {
            width: 100%;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .join-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Call Screen */
        .call-screen {
            background: #000;
            position: relative;
        }

        .header {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .room-code-display {
            font-size: 24px;
            font-weight: 600;
            font-family: 'Monaco', 'Courier New', monospace;
            letter-spacing: 3px;
        }

        .room-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: background 0.2s;
        }

        .action-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        .action-btn.share {
            background: #667eea;
        }

        /* Participants */
        .participants-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .participant-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .participant-card.speaking {
            background: rgba(102, 126, 234, 0.15);
            border-color: #667eea;
        }

        .participant-card.me {
            background: rgba(102, 126, 234, 0.1);
        }

        .participant-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .participant-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .participant-info {
            flex: 1;
        }

        .participant-name {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 3px;
        }

        .participant-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
        }

        .status-indicator.speaking {
            background: #667eea;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .participant-badge {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
        }

        .kick-btn {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .kick-btn:active {
            background: rgba(239, 68, 68, 0.3);
        }

        .participant-volume {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: 65px; /* выравнивание под аватаром */
        }

        .volume-slider {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }

        .volume-value {
            min-width: 45px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }

        /* Call Controls */
        .call-controls {
            padding: 30px 20px;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.2s;
        }

        .control-btn:active {
            transform: scale(0.9);
        }

        .mute-btn {
            background: rgba(255, 255, 255, 0.1);
        }

        .mute-btn.active {
            background: #ef4444;
        }

        .end-call-btn {
            background: #ef4444;
            width: 70px;
            height: 70px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            padding: 15px 25px;
            border-radius: 15px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Loading */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Mobile Optimizations */
        @media (max-width: 768px) {
            .home-screen {
                padding: 30px 20px;
            }

            .logo h1 {
                font-size: 36px;
            }

            .create-btn, .join-btn {
                height: 55px;
            }

            .room-code-display {
                font-size: 20px;
            }

            .control-btn {
                width: 55px;
                height: 55px;
                font-size: 22px;
            }

            .end-call-btn {
                width: 60px;
                height: 60px;
            }

            .participant-volume {
                margin-left: 65px;
            }
        }

        /* Speaker Button - только на мобильных */
        @media (max-width: 768px) {
            .speaker-btn {
                display: block;
            }
        }

        @media (min-width: 769px) {
            .speaker-btn {
                display: none;
            }
        }

        .speaker-btn {
            background: rgba(255, 255, 255, 0.1);
        }

        .speaker-btn.active {
            background: #667eea;
        }

        /* Safe areas for iPhone */
        @supports (padding: max(0px)) {
            .header, .call-controls {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
            }
            
            .call-controls {
                padding-bottom: max(30px, env(safe-area-inset-bottom));
            }
            
            .home-screen {
                padding-top: max(40px, env(safe-area-inset-top));
                padding-bottom: max(40px, env(safe-area-inset-bottom));
            }
        }

        /* Scrollbar */
        .participants-container::-webkit-scrollbar {
            width: 6px;
        }

        .participants-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .participants-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        /* Connection Status */
        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .connection-dot.connected {
            background: #10b981;
            animation: pulse 2s infinite;
        }

        .connection-dot.disconnected {
            background: #ef4444;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div id="loadingText">Подключение...</div>
    </div>

    <!-- Connection Status -->
    <div class="connection-status" id="connectionStatus" style="display: none;">
        <div class="connection-dot disconnected"></div>
        <span>Отключен</span>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- App Container -->
    <div class="app" id="app">
        <!-- Home Screen -->
        <div class="screen home-screen active" id="homeScreen">
            <div class="logo">
                <h1>Call</h1>
                <p>Бесплатные звонки в браузере</p>
            </div>

            <div class="call-actions">
                <button class="create-btn" onclick="createRoom()">
                    <i class="fas fa-plus"></i>
                    Создать звонок
                </button>

                <div class="divider">
                    или
                </div>

                <div class="join-section">
                    <input type="text" class="join-input" id="roomCode" 
                           placeholder="Введите код звонка" maxlength="6" 
                           onkeypress="if(event.key=='Enter') joinRoom()">
                    <button class="join-btn" onclick="joinRoom()">
                        <i class="fas fa-sign-in-alt"></i>
                        Присоединиться
                    </button>
                </div>
            </div>

            <div style="margin-top: 20px; color: rgba(255, 255, 255, 0.4); font-size: 12px; text-align: center;">
                <p>Без регистрации • End-to-end шифрование • Работает в браузере</p>
            </div>
        </div>

        <!-- Call Screen -->
        <div class="screen call-screen" id="callScreen">
            <div class="header">
                <div class="room-info">
                    <div style="font-size: 14px; color: rgba(255, 255, 255, 0.6);">
                        <i class="fas fa-hashtag"></i> Код звонка
                    </div>
                    <div class="room-code-display" id="currentRoomCode">------</div>
                </div>
                
                <div class="room-actions">
                    <button class="action-btn share" id="shareBtn" onclick="shareRoomCode()">
                        <i class="fas fa-share-alt"></i>
                    </button>
                    <button class="action-btn" onclick="copyRoomCode()">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
            </div>

            <div class="participants-container" id="participantsView">
                <!-- Participants will be added here -->
            </div>

            <div class="call-controls">
                <button class="control-btn mute-btn" id="muteBtn" onclick="toggleMic()">
                    <i class="fas fa-microphone"></i>
                </button>
                
                <!-- Кнопка динамика только на мобильных -->
                <button class="control-btn speaker-btn" id="speakerBtn" onclick="toggleSpeaker()">
                    <i class="fas fa-volume-up"></i>
                </button>
                
                <button class="control-btn end-call-btn" onclick="leaveRoom()">
                    <i class="fas fa-phone"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Audio Elements (will be created dynamically) -->
    <div id="audioContainer"></div>
<script>
    // Конфигурация
    const API_URL = "https://functions.yandexcloud.net/d4etraj6pl3ep8uj8cd8";
    
    const config = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun3.l.google.com:19302' },
            { urls: 'stun:stun4.l.google.com:19302' },
            { urls: 'stun:global.stun.twilio.com:3478' },
            { 
                urls: 'turn:openrelay.metered.ca:80',
                username: 'openrelayproject',
                credential: 'openrelayproject'
            },
            { 
                urls: 'turn:openrelay.metered.ca:443',
                username: 'openrelayproject',
                credential: 'openrelayproject'
            }
        ],
        iceCandidatePoolSize: 10
    };
    
    const state = {
        userId: null,
        userName: null,
        roomId: null,
        roomOwner: false,
        localStream: null,
        peerConnections: {},
        isMuted: true,
        signalInterval: null,
        updateInterval: null,
        participants: [],
        pendingCandidates: {},
        volumes: JSON.parse(localStorage.getItem('call_volumes')) || {},
        connectionAttempts: {},
        lastPollTime: 0,
        processedSignals: new Set(),
        audioElements: {}
    };
    
    document.addEventListener('DOMContentLoaded', init);
    
    async function init() {
        console.log('=== Call App Initialization ===');
        
        state.userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        state.userName = generateName();
        
        console.log('User ID:', state.userId);
        console.log('User Name:', state.userName);
        
        if (!checkSupport()) {
            showToast('Ваш браузер не поддерживает звонки', 5000);
            document.getElementById('loadingText').textContent = 'Браузер не поддерживается';
            return;
        }
    
        await checkConnection();
        
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
        }, 1000);
    }
    
    function generateName() {
        const names = ['Алексей', 'Максим', 'Дмитрий', 'Иван', 'Сергей', 'Андрей', 'Михаил', 'Павел', 'Анна', 'Мария'];
        const surnames = ['Петров', 'Иванов', 'Сидоров', 'Кузнецов', 'Смирнов', 'Попов', 'Лебедев', 'Козлов'];
        return `${names[Math.floor(Math.random() * names.length)]} ${surnames[Math.floor(Math.random() * surnames.length)]}`;
    }
    
    function checkSupport() {
        return !!(window.RTCPeerConnection && navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
    }
    
    async function checkConnection() {
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'ping' })
            });
            updateConnectionStatus(response.ok);
            return response.ok;
        } catch (error) {
            updateConnectionStatus(false);
            return false;
        }
    }
    
    function updateConnectionStatus(connected) {
        const status = document.getElementById('connectionStatus');
        if (!status) return;
        
        const dot = status.querySelector('.connection-dot');
        const text = status.querySelector('span');
        
        status.style.display = 'flex';
        dot.className = connected ? 'connection-dot connected' : 'connection-dot disconnected';
        text.textContent = connected ? 'Подключено' : 'Отключено';
    }
    
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }
    
    function showToast(message, duration = 3000) {
        const toast = document.getElementById('toast');
        if (!toast) return;
        
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), duration);
    }
    
    async function createRoom() {
        showLoading('Создание звонка...');
        
        try {
            if (!state.localStream) {
                await requestMicrophonePermission();
            }
            
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'createRoom', 
                    userId: state.userId,
                    userName: state.userName 
                })
            });
    
            const data = await response.json();
            
            if (data.success) {
                state.roomId = data.roomId;
                state.roomOwner = true;
                await startCall();
                showToast('Звонок создан! Код скопирован');
            } else {
                throw new Error(data.error);
            }
        } catch (error) {
            showToast('Ошибка создания звонка');
        } finally {
            hideLoading();
        }
    }
    
    async function joinRoom() {
        const code = document.getElementById('roomCode').value.trim().toUpperCase();
        
        if (!code || code.length !== 6) {
            showToast('Введите 6-значный код');
            return;
        }
    
        showLoading('Присоединение...');
        
        try {
            if (!state.localStream) {
                await requestMicrophonePermission();
            }
            
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'joinRoom', 
                    roomId: code,
                    userId: state.userId,
                    userName: state.userName 
                })
            });
    
            const data = await response.json();
            
            if (data.success) {
                state.roomId = code;
                state.roomOwner = false;
                await startCall();
                showToast('Присоединились к звонку');
            } else {
                throw new Error(data.error);
            }
        } catch (error) {
            showToast('Ошибка присоединения');
        } finally {
            hideLoading();
        }
    }
    
    async function requestMicrophonePermission() {
        try {
            state.localStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true
                },
                video: false
            });
            
            state.isMuted = false;
            state.localStream.getAudioTracks().forEach(track => track.enabled = true);
            updateMicUI();
            
            return state.localStream;
        } catch (error) {
            let errorMessage = 'Ошибка доступа к микрофону';
            if (error.name === 'NotAllowedError') {
                errorMessage = 'Доступ к микрофону отклонен';
            } else if (error.name === 'NotFoundError') {
                errorMessage = 'Микрофон не найден';
            }
            showToast(errorMessage, 5000);
            throw error;
        }
    }
    
    async function startCall() {
        try {
            showScreen('callScreen');
            document.getElementById('currentRoomCode').textContent = state.roomId;
            
            updateShareButton();
            
            if (state.roomOwner) {
                setTimeout(() => copyRoomCode(), 500);
            }
            
            startUpdates();
            await updateParticipants();
            
        } catch (error) {
            showToast('Ошибка начала звонка');
            showScreen('homeScreen');
        }
    }
    
    function updateShareButton() {
        const shareBtn = document.getElementById('shareBtn');
        shareBtn.style.display = navigator.share ? 'flex' : 'none';
    }
    
    function toggleMic() {
        if (!state.localStream) {
            requestMicrophonePermission().then(() => {
                state.isMuted = false;
                updateMicUI();
            });
            return;
        }
        
        state.isMuted = !state.isMuted;
        state.localStream.getAudioTracks().forEach(track => {
            track.enabled = !state.isMuted;
        });
        
        updateMicUI();
        showToast(state.isMuted ? 'Микрофон выключен' : 'Микрофон включен', 1500);
    }
    
    function updateMicUI() {
        const btn = document.getElementById('muteBtn');
        if (!btn) return;
        
        btn.classList.toggle('active', state.isMuted);
        btn.innerHTML = state.isMuted ? 
            '<i class="fas fa-microphone-slash"></i>' : 
            '<i class="fas fa-microphone"></i>';
    }
    
    async function copyRoomCode() {
        if (!state.roomId) return;
        
        try {
            await navigator.clipboard.writeText(state.roomId);
            showToast('Код скопирован');
        } catch (error) {
            const input = document.createElement('input');
            input.value = state.roomId;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            showToast('Код скопирован');
        }
    }
    
    async function shareRoomCode() {
        if (!state.roomId) return;
        
        if (navigator.share) {
            try {
                await navigator.share({
                    title: 'Присоединиться к звонку',
                    text: `Код звонка: ${state.roomId}`,
                    url: window.location.href
                });
            } catch (error) {
                if (error.name !== 'AbortError') copyRoomCode();
            }
        } else {
            copyRoomCode();
        }
    }
    
    function startUpdates() {
        if (state.updateInterval) clearInterval(state.updateInterval);
        if (state.signalInterval) clearInterval(state.signalInterval);
        
        state.updateInterval = setInterval(updateParticipants, 2000);
        state.signalInterval = setInterval(pollSignals, 1000);
        
        setTimeout(() => {
            updateParticipants();
            pollSignals();
        }, 500);
    }
    
    async function updateParticipants() {
        if (!state.roomId) return;
        
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'getParticipants', 
                    roomId: state.roomId,
                    userId: state.userId 
                })
            });
    
            if (response.ok) {
                const data = await response.json();
                if (data.success) {
                    const oldParticipants = state.participants.map(p => p.id).sort();
                    const newParticipants = data.participants.map(p => p.id).sort();
                    
                    state.participants = data.participants || [];
                    
                    if (JSON.stringify(oldParticipants) !== JSON.stringify(newParticipants)) {
                        console.log('👥 Participants:', state.participants.length);
                        renderParticipants();
                        connectToNewParticipants(oldParticipants, newParticipants);
                    }
                }
            }
        } catch (error) {
            console.error('Update error:', error);
        }
    }
    
    function connectToNewParticipants(oldList, newList) {
        const newParticipants = newList.filter(id => 
            id !== state.userId && 
            !oldList.includes(id) && 
            !state.peerConnections[id]
        );
        
        newParticipants.forEach(peerId => {
            console.log('🤝 Connecting to:', peerId);
            createPeerConnection(peerId);
        });
        
        Object.keys(state.peerConnections).forEach(peerId => {
            if (!newList.includes(peerId) && peerId !== state.userId) {
                cleanupPeerConnection(peerId);
            }
        });
    }
    
    function renderParticipants() {
        const container = document.getElementById('participantsView');
        if (!container) return;
        
        container.innerHTML = '';
        
        if (state.participants.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.4);"><i class="fas fa-users" style="font-size: 48px;"></i><p>Ожидание участников...</p></div>';
            return;
        }
        
        state.participants.forEach(p => {
            container.appendChild(createParticipantCard(p));
        });
    }
    
    function createParticipantCard(participant) {
        const isMe = participant.id === state.userId;
        const card = document.createElement('div');
        card.className = `participant-card ${isMe ? 'me' : ''}`;
        
        const row = document.createElement('div');
        row.className = 'participant-row';
        
        const avatar = document.createElement('div');
        avatar.className = 'participant-avatar';
        avatar.style.background = getColor(participant.id);
        avatar.textContent = getInitials(participant.name || participant.id);
        
        const info = document.createElement('div');
        info.className = 'participant-info';
        info.innerHTML = `
            <div class="participant-name">
                ${participant.name || participant.id} ${isMe ? '(Вы)' : ''}
            </div>
            <div class="participant-status">
                <div class="status-indicator"></div>
                В сети
                ${participant.isOwner ? '<span class="participant-badge">Создатель</span>' : ''}
            </div>
        `;
        
        row.appendChild(avatar);
        row.appendChild(info);
        
        if (state.roomOwner && !isMe) {
            const kickBtn = document.createElement('button');
            kickBtn.className = 'kick-btn';
            kickBtn.innerHTML = '<i class="fas fa-user-slash"></i>';
            kickBtn.onclick = () => kickParticipant(participant.id);
            row.appendChild(kickBtn);
        }
        
        card.appendChild(row);
        
        if (!isMe) {
            const volumeBlock = document.createElement('div');
            volumeBlock.className = 'participant-volume';
            
            const volumeValue = state.volumes[participant.id] || 1;
            
            volumeBlock.innerHTML = `
                <input type="range" min="0" max="1" step="0.01" value="${volumeValue}" 
                       data-peerid="${participant.id}" class="volume-slider">
                <span class="volume-value" data-peerid="${participant.id}">${Math.round(volumeValue * 100)}%</span>
            `;
            
            const slider = volumeBlock.querySelector('.volume-slider');
            slider.addEventListener('input', (e) => {
                const peerId = e.target.dataset.peerid;
                const value = parseFloat(e.target.value);
                updateVolume(peerId, value);
            });
            
            card.appendChild(volumeBlock);
        }
        
        return card;
    }
    
    function updateVolume(peerId, value) {
        value = Math.min(1, Math.max(0, parseFloat(value)));
        
        state.volumes[peerId] = value;
        localStorage.setItem('call_volumes', JSON.stringify(state.volumes));
        
        const audio = document.getElementById(`audio_${peerId}`);
        if (audio) {
            audio.volume = value;
        }
        
        const volumeSpan = document.querySelector(`.volume-value[data-peerid="${peerId}"]`);
        if (volumeSpan) {
            volumeSpan.textContent = Math.round(value * 100) + '%';
        }
        
        const slider = document.querySelector(`.volume-slider[data-peerid="${peerId}"]`);
        if (slider && parseFloat(slider.value) !== value) {
            slider.value = value;
        }
    }
    
    function getInitials(name) {
        const words = name.split(' ');
        return words.length >= 2 ? (words[0][0] + words[1][0]).toUpperCase() : name.substring(0, 2);
    }
    
    function getColor(id) {
        const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#00d2ff', '#3a7bd5', '#5eead4', '#10b981'];
        let hash = 0;
        for (let i = 0; i < id.length; i++) {
            hash = id.charCodeAt(i) + ((hash << 5) - hash);
        }
        return colors[Math.abs(hash) % colors.length];
    }
    
    async function kickParticipant(participantId) {
        if (!confirm('Удалить участника?')) return;
        
        try {
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'kickParticipant',
                    roomId: state.roomId,
                    userId: state.userId,
                    participantId
                })
            });
            showToast('Участник удален');
        } catch (error) {
            showToast('Ошибка удаления');
        }
    }
    
    async function createPeerConnection(peerId) {
        if (state.peerConnections[peerId]) return;
        
        console.log(`🔗 Creating connection to ${peerId}`);
        
        try {
            const pc = new RTCPeerConnection(config);
            state.peerConnections[peerId] = pc;
            
            if (state.localStream) {
                state.localStream.getTracks().forEach(track => {
                    pc.addTrack(track, state.localStream);
                });
            }
            
            pc.onicecandidate = (e) => {
                if (e.candidate) {
                    sendSignal(peerId, 'candidate', e.candidate);
                }
            };
            
            pc.ontrack = (e) => {
                console.log(`🎵 Received track from ${peerId}`);
                const stream = e.streams[0];
                if (!stream) return;
                
                const audioId = `audio_${peerId}`;
                let audio = document.getElementById(audioId);
                
                if (!audio) {
                    audio = document.createElement('audio');
                    audio.id = audioId;
                    audio.autoplay = true;
                    audio.controls = false;
                    audio.style.display = 'none';
                    document.getElementById('audioContainer').appendChild(audio);
                }
                
                audio.srcObject = stream;
                
                const savedVolume = state.volumes[peerId] || 1;
                audio.volume = savedVolume;
                
                audio.play().then(() => {
                    console.log(`✅ Audio playing for ${peerId}`);
                }).catch(err => {
                    console.log(`⚠️ Audio play error:`, err);
                    const enableAudio = () => {
                        audio.play();
                        document.removeEventListener('click', enableAudio);
                    };
                    document.addEventListener('click', enableAudio, { once: true });
                });
                
                state.audioElements[peerId] = audio;
            };
            
            pc.oniceconnectionstatechange = () => {
                console.log(`🔗 ICE state: ${pc.iceConnectionState}`);
                if (pc.iceConnectionState === 'connected') {
                    console.log(`✅ Connected to ${peerId}`);
                }
            };
            
            if (state.userId < peerId) {
                setTimeout(async () => {
                    try {
                        const offer = await pc.createOffer({
                            offerToReceiveAudio: true,
                            offerToReceiveVideo: false
                        });
                        await pc.setLocalDescription(offer);
                        await sendSignal(peerId, 'offer', offer);
                        console.log(`✅ Offer sent to ${peerId}`);
                    } catch (error) {
                        console.error(`❌ Offer error:`, error);
                    }
                }, 500);
            }
            
        } catch (error) {
            console.error(`❌ Connection error:`, error);
        }
    }
    
    function cleanupPeerConnection(peerId) {
        if (state.peerConnections[peerId]) {
            state.peerConnections[peerId].close();
            delete state.peerConnections[peerId];
        }
        
        const audio = document.getElementById(`audio_${peerId}`);
        if (audio) audio.remove();
        
        delete state.audioElements[peerId];
    }
    
    async function pollSignals() {
        if (!state.roomId) return;
        
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'getSignals',
                    roomId: state.roomId,
                    userId: state.userId,
                    timestamp: state.lastPollTime
                })
            });
    
            if (response.ok) {
                const data = await response.json();
                if (data.success && data.signals?.length > 0) {
                    console.log(`📡 Received ${data.signals.length} signals`);
                    state.lastPollTime = Date.now();
                    
                    for (const signal of data.signals) {
                        await handleSignal(signal);
                    }
                }
            }
        } catch (error) {
            console.error('Poll error:', error);
        }
    }
    
    async function handleSignal(signal) {
        const signalId = `${signal.from}_${signal.type}_${Date.now()}`;
        if (state.processedSignals.has(signalId)) return;
        state.processedSignals.add(signalId);
        
        if (signal.from === state.userId) return;
        
        console.log(`📨 ${signal.type} from ${signal.from}`);
        
        try {
            switch (signal.type) {
                case 'offer':
                    await handleOffer(signal.from, signal.data);
                    break;
                case 'answer':
                    await handleAnswer(signal.from, signal.data);
                    break;
                case 'candidate':
                    await handleCandidate(signal.from, signal.data);
                    break;
            }
        } catch (error) {
            console.error(`Signal error:`, error);
        }
    }
    
    async function sendSignal(to, type, data) {
        if (!state.roomId) return;
        
        try {
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'signal',
                    roomId: state.roomId,
                    userId: state.userId,
                    signal: { to, type, data }
                })
            });
        } catch (error) {
            console.error('Send error:', error);
        }
    }
    
    async function handleOffer(peerId, offer) {
        console.log(`📨 Handling offer`);
        
        let pc = state.peerConnections[peerId];
        
        if (!pc) {
            pc = new RTCPeerConnection(config);
            state.peerConnections[peerId] = pc;
            
            if (state.localStream) {
                state.localStream.getTracks().forEach(track => {
                    pc.addTrack(track, state.localStream);
                });
            }
            
            pc.onicecandidate = (e) => {
                if (e.candidate) {
                    sendSignal(peerId, 'candidate', e.candidate);
                }
            };
            
            pc.ontrack = (e) => {
                console.log(`🎵 Received track from ${peerId}`);
                const stream = e.streams[0];
                if (!stream) return;
                
                const audioId = `audio_${peerId}`;
                let audio = document.getElementById(audioId);
                
                if (!audio) {
                    audio = document.createElement('audio');
                    audio.id = audioId;
                    audio.autoplay = true;
                    audio.style.display = 'none';
                    document.getElementById('audioContainer').appendChild(audio);
                }
                
                audio.srcObject = stream;
                
                const savedVolume = state.volumes[peerId] || 1;
                audio.volume = savedVolume;
                
                audio.play().catch(err => {
                    console.log('Play error:', err);
                    document.addEventListener('click', () => audio.play(), { once: true });
                });
                
                state.audioElements[peerId] = audio;
            };
        }
        
        try {
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            console.log(`✅ Remote description set`);
            
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            
            await sendSignal(peerId, 'answer', answer);
            console.log(`✅ Answer sent`);
            
            if (state.pendingCandidates[peerId]) {
                for (const candidate of state.pendingCandidates[peerId]) {
                    try {
                        await pc.addIceCandidate(new RTCIceCandidate(candidate));
                    } catch (e) {}
                }
                delete state.pendingCandidates[peerId];
            }
            
        } catch (error) {
            console.error(`Offer error:`, error);
        }
    }
    
    async function handleAnswer(peerId, answer) {
        console.log(`📨 Handling answer`);
        
        const pc = state.peerConnections[peerId];
        if (!pc) return;
        
        try {
            if (pc.signalingState === 'have-local-offer') {
                await pc.setRemoteDescription(new RTCSessionDescription(answer));
                console.log(`✅ Remote description set from answer`);
            } else {
                console.log(`⏳ Ignoring answer in state: ${pc.signalingState}`);
            }
        } catch (error) {
            console.error(`Answer error:`, error);
        }
    }
    
    async function handleCandidate(peerId, candidate) {
        const pc = state.peerConnections[peerId];
        
        if (!pc || pc.remoteDescription === null) {
            if (!state.pendingCandidates[peerId]) {
                state.pendingCandidates[peerId] = [];
            }
            state.pendingCandidates[peerId].push(candidate);
            return;
        }
        
        try {
            await pc.addIceCandidate(new RTCIceCandidate(candidate));
        } catch (error) {
            console.warn(`Candidate error:`, error.message);
        }
    }
    
    async function leaveRoom() {
        if (!confirm('Завершить звонок?')) return;
        
        if (state.roomId) {
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'leaveRoom', 
                        roomId: state.roomId, 
                        userId: state.userId 
                    })
                });
            } catch (error) {}
        }
        
        cleanup();
        showScreen('homeScreen');
        document.getElementById('roomCode').value = '';
    }
    
    function cleanup() {
        if (state.updateInterval) clearInterval(state.updateInterval);
        if (state.signalInterval) clearInterval(state.signalInterval);
        
        Object.values(state.peerConnections).forEach(pc => pc.close());
        state.peerConnections = {};
        
        document.getElementById('audioContainer').innerHTML = '';
        state.audioElements = {};
        
        if (state.localStream) {
            state.localStream.getTracks().forEach(track => track.stop());
            state.localStream = null;
        }
        
        state.roomId = null;
        state.roomOwner = false;
        state.pendingCandidates = {};
        state.processedSignals.clear();
    }
    
    function showLoading(text = 'Загрузка...') {
        document.getElementById('loading').style.display = 'flex';
        document.getElementById('loadingText').textContent = text;
    }
    
    function hideLoading() {
        document.getElementById('loading').style.display = 'none';
    }
    
    document.getElementById('roomCode')?.addEventListener('input', function() {
        this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '').substring(0, 6);
    });
    
    document.addEventListener('click', () => {
        Object.values(state.audioElements).forEach(audio => {
            if (audio.paused) {
                audio.play().catch(() => {});
            }
        });
    }, { once: true });
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && state.roomId) leaveRoom();
        if (e.key === 'm' && (e.ctrlKey || e.metaKey)) {
            toggleMic();
            e.preventDefault();
        }
    });
</script>
</body>
