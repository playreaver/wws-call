<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Call</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* App Container */
        .app {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .screen {
            flex: 1;
            display: none;
            flex-direction: column;
            background: #000;
        }

        .screen.active {
            display: flex;
        }

        /* Home Screen */
        .home-screen {
            padding: 40px 20px;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }

        .logo {
            text-align: center;
        }

        .logo h1 {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
        }

        .call-actions {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 300px;
        }

        .create-btn {
            width: 100%;
            height: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .create-btn:active {
            transform: scale(0.98);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            color: rgba(255, 255, 255, 0.4);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }

        .join-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .join-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 15px 20px;
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
        }

        .join-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .join-btn {
            width: 100%;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .join-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Call Screen */
        .call-screen {
            background: #000;
            position: relative;
        }

        .header {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .room-code-display {
            font-size: 24px;
            font-weight: 600;
            font-family: 'Monaco', 'Courier New', monospace;
            letter-spacing: 3px;
        }

        .room-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: background 0.2s;
        }

        .action-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        .action-btn.share {
            background: #667eea;
        }

        /* Participants */
        .participants-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .participant-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .participant-card.speaking {
            background: rgba(102, 126, 234, 0.15);
            border-color: #667eea;
        }

        .participant-card.me {
            background: rgba(102, 126, 234, 0.1);
        }

        .participant-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .participant-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .participant-info {
            flex: 1;
        }

        .participant-name {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 3px;
        }

        .participant-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
        }

        .status-indicator.speaking {
            background: #667eea;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .participant-badge {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
        }

        .kick-btn {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .kick-btn:active {
            background: rgba(239, 68, 68, 0.3);
        }

        .participant-volume {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: 65px; /* выравнивание под аватаром */
        }

        .volume-slider {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }

        .volume-value {
            min-width: 45px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }

        /* Call Controls */
        .call-controls {
            padding: 30px 20px;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.2s;
        }

        .control-btn:active {
            transform: scale(0.9);
        }

        .mute-btn {
            background: rgba(255, 255, 255, 0.1);
        }

        .mute-btn.active {
            background: #ef4444;
        }

        .end-call-btn {
            background: #ef4444;
            width: 70px;
            height: 70px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            padding: 15px 25px;
            border-radius: 15px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Loading */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Mobile Optimizations */
        @media (max-width: 768px) {
            .home-screen {
                padding: 30px 20px;
            }

            .logo h1 {
                font-size: 36px;
            }

            .create-btn, .join-btn {
                height: 55px;
            }

            .room-code-display {
                font-size: 20px;
            }

            .control-btn {
                width: 55px;
                height: 55px;
                font-size: 22px;
            }

            .end-call-btn {
                width: 60px;
                height: 60px;
            }

            .participant-volume {
                margin-left: 65px;
            }
        }

        /* Speaker Button - только на мобильных */
        @media (max-width: 768px) {
            .speaker-btn {
                display: block;
            }
        }

        @media (min-width: 769px) {
            .speaker-btn {
                display: none;
            }
        }

        .speaker-btn {
            background: rgba(255, 255, 255, 0.1);
        }

        .speaker-btn.active {
            background: #667eea;
        }

        /* Safe areas for iPhone */
        @supports (padding: max(0px)) {
            .header, .call-controls {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
            }
            
            .call-controls {
                padding-bottom: max(30px, env(safe-area-inset-bottom));
            }
            
            .home-screen {
                padding-top: max(40px, env(safe-area-inset-top));
                padding-bottom: max(40px, env(safe-area-inset-bottom));
            }
        }

        /* Scrollbar */
        .participants-container::-webkit-scrollbar {
            width: 6px;
        }

        .participants-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .participants-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        /* Connection Status */
        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .connection-dot.connected {
            background: #10b981;
            animation: pulse 2s infinite;
        }

        .connection-dot.disconnected {
            background: #ef4444;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div id="loadingText">Подключение...</div>
    </div>

    <!-- Connection Status -->
    <div class="connection-status" id="connectionStatus" style="display: none;">
        <div class="connection-dot disconnected"></div>
        <span>Отключен</span>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- App Container -->
    <div class="app" id="app">
        <!-- Home Screen -->
        <div class="screen home-screen active" id="homeScreen">
            <div class="logo">
                <h1>Call</h1>
                <p>Бесплатные звонки в браузере</p>
            </div>

            <div class="call-actions">
                <button class="create-btn" onclick="createRoom()">
                    <i class="fas fa-plus"></i>
                    Создать звонок
                </button>

                <div class="divider">
                    или
                </div>

                <div class="join-section">
                    <input type="text" class="join-input" id="roomCode" 
                           placeholder="Введите код звонка" maxlength="6" 
                           onkeypress="if(event.key=='Enter') joinRoom()">
                    <button class="join-btn" onclick="joinRoom()">
                        <i class="fas fa-sign-in-alt"></i>
                        Присоединиться
                    </button>
                </div>
            </div>

            <div style="margin-top: 20px; color: rgba(255, 255, 255, 0.4); font-size: 12px; text-align: center;">
                <p>Без регистрации • End-to-end шифрование • Работает в браузере</p>
            </div>
        </div>

        <!-- Call Screen -->
        <div class="screen call-screen" id="callScreen">
            <div class="header">
                <div class="room-info">
                    <div style="font-size: 14px; color: rgba(255, 255, 255, 0.6);">
                        <i class="fas fa-hashtag"></i> Код звонка
                    </div>
                    <div class="room-code-display" id="currentRoomCode">------</div>
                </div>
                
                <div class="room-actions">
                    <button class="action-btn share" id="shareBtn" onclick="shareRoomCode()">
                        <i class="fas fa-share-alt"></i>
                    </button>
                    <button class="action-btn" onclick="copyRoomCode()">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
            </div>

            <div class="participants-container" id="participantsView">
                <!-- Participants will be added here -->
            </div>

            <div class="call-controls">
                <button class="control-btn mute-btn" id="muteBtn" onclick="toggleMic()">
                    <i class="fas fa-microphone"></i>
                </button>
                
                <!-- Кнопка динамика только на мобильных -->
                <button class="control-btn speaker-btn" id="speakerBtn" onclick="toggleSpeaker()">
                    <i class="fas fa-volume-up"></i>
                </button>
                
                <button class="control-btn end-call-btn" onclick="leaveRoom()">
                    <i class="fas fa-phone"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Audio Elements (will be created dynamically) -->
    <div id="audioContainer"></div>

<script>
    // Конфигурация
    const API_URL = "https://functions.yandexcloud.net/d4etraj6pl3ep8uj8cd8";
    
    // Улучшенная WebRTC Configuration с лучшими STUN/TURN серверами
    const config = {
        iceServers: [
            // Google STUN серверы
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun3.l.google.com:19302' },
            { urls: 'stun:stun4.l.google.com:19302' },
            
            // Twilio STUN серверы
            { urls: 'stun:global.stun.twilio.com:3478' },
            
            // Публичные TURN серверы
            { 
                urls: 'turn:openrelay.metered.ca:80',
                username: 'openrelayproject',
                credential: 'openrelayproject'
            },
            { 
                urls: 'turn:openrelay.metered.ca:443',
                username: 'openrelayproject',
                credential: 'openrelayproject'
            },
            { 
                urls: 'turn:openrelay.metered.ca:443?transport=tcp',
                username: 'openrelayproject',
                credential: 'openrelayproject'
            }
        ],
        iceCandidatePoolSize: 10,
        iceTransportPolicy: 'all',
        bundlePolicy: 'max-bundle',
        rtcpMuxPolicy: 'require'
    };
    
    // Состояние приложения
    const state = {
        userId: null,
        userName: null,
        roomId: null,
        roomOwner: false,
        localStream: null,
        peerConnections: {},
        isMuted: true,
        isSpeaker: false,
        signalInterval: null,
        updateInterval: null,
        participants: [],
        pendingCandidates: {},
        audioContext: null,
        audioAnalyzers: {},
        audioNodes: {}, // Web Audio узлы (source, analyser, gainNode) по peerId
        volumes: JSON.parse(localStorage.getItem('call_volumes')) || {}, // настройки громкости (>100%)
        connectionAttempts: {},
        lastPollTime: 0,
        processedSignals: new Set(),
        reconnectionAttempts: {},
        statsInterval: null
    };
    
    // Инициализация
    document.addEventListener('DOMContentLoaded', init);
    
    async function init() {
        console.log('=== Call App Initialization ===');
        
        // Генерация ID и имени
        state.userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        state.userName = generateName();
        
        console.log('User ID:', state.userId);
        console.log('User Name:', state.userName);
        console.log('WebRTC Support:', !!window.RTCPeerConnection);
        console.log('API URL:', API_URL);
        
        // Проверка поддержки
        if (!checkSupport()) {
            showToast('Ваш браузер не поддерживает звонки', 5000);
            document.getElementById('loadingText').textContent = 'Браузер не поддерживается';
            return;
        }
    
        // Проверка подключения
        const connected = await checkConnection();
        
        if (!connected) {
            showToast('Проверьте подключение к интернету', 3000);
        }
        
        // Скрываем загрузку
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
        }, 1000);
    }
    
    function generateName() {
        const names = [
            'Алексей', 'Максим', 'Дмитрий', 'Иван', 'Сергей', 
            'Андрей', 'Михаил', 'Павел', 'Анна', 'Мария', 
            'Екатерина', 'Ольга', 'Татьяна', 'Наталья'
        ];
        const surnames = [
            'Петров', 'Иванов', 'Сидоров', 'Кузнецов', 'Смирнов',
            'Попов', 'Лебедев', 'Козлов', 'Новиков', 'Морозов'
        ];
        
        const name = names[Math.floor(Math.random() * names.length)];
        const surname = surnames[Math.floor(Math.random() * surnames.length)];
        
        return `${name} ${surname}`;
    }
    
    function checkSupport() {
        const supported = window.RTCPeerConnection && navigator.mediaDevices && navigator.mediaDevices.getUserMedia;
        console.log('WebRTC Support Check:', supported);
        return !!supported;
    }
    
    async function checkConnection() {
        try {
            console.log('Checking API connection...');
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'ping' })
            });
            
            const connected = response.ok;
            updateConnectionStatus(connected);
            console.log('API Connection:', connected ? 'OK' : 'FAILED');
            return connected;
        } catch (error) {
            console.error('Connection check error:', error);
            updateConnectionStatus(false);
            return false;
        }
    }
    
    function updateConnectionStatus(connected) {
        const status = document.getElementById('connectionStatus');
        if (!status) return;
        
        const dot = status.querySelector('.connection-dot');
        const text = status.querySelector('span');
        
        status.style.display = 'flex';
        dot.className = connected ? 'connection-dot connected' : 'connection-dot disconnected';
        text.textContent = connected ? 'Подключено' : 'Отключено';
    }
    
    // Навигация
    function showScreen(screenId) {
        console.log('Showing screen:', screenId);
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }
    
    // Уведомления
    function showToast(message, duration = 3000) {
        const toast = document.getElementById('toast');
        if (!toast) return;
        
        console.log('Toast:', message);
        toast.textContent = message;
        toast.classList.add('show');
        
        setTimeout(() => {
            toast.classList.remove('show');
        }, duration);
    }
    
    // Создание комнаты
    async function createRoom() {
        showLoading('Создание звонка...');
        console.log('Creating room...');
        
        try {
            // Сначала запрашиваем доступ к микрофону
            if (!state.localStream) {
                try {
                    await requestMicrophonePermission();
                } catch (error) {
                    showToast('Не удалось получить доступ к микрофону. Проверьте разрешения.');
                    hideLoading();
                    return;
                }
            }
            
            console.log('Sending createRoom request...');
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'createRoom', 
                    userId: state.userId,
                    userName: state.userName 
                })
            });
    
            console.log('Create room response status:', response.status);
            const data = await response.json();
            console.log('Create room response:', data);
            
            if (data.success) {
                state.roomId = data.roomId;
                state.roomOwner = true;
                console.log('✅ Room created:', state.roomId);
                await startCall();
                showToast('Звонок создан! Код скопирован');
            } else {
                throw new Error(data.error || 'Ошибка создания');
            }
        } catch (error) {
            console.error('Create room error:', error);
            showToast('Ошибка создания звонка');
        } finally {
            hideLoading();
        }
    }
    
    // Присоединение к комнате
    async function joinRoom() {
        const code = document.getElementById('roomCode').value.trim().toUpperCase();
        
        if (!code || code.length !== 6) {
            showToast('Введите 6-значный код звонка');
            return;
        }
    
        showLoading('Присоединение...');
        console.log('Joining room:', code);
        
        try {
            // Сначала запрашиваем доступ к микрофону
            if (!state.localStream) {
                try {
                    await requestMicrophonePermission();
                } catch (error) {
                    showToast('Не удалось получить доступ к микрофону. Проверьте разрешения.');
                    hideLoading();
                    return;
                }
            }
            
            console.log('Sending joinRoom request...');
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'joinRoom', 
                    roomId: code,
                    userId: state.userId,
                    userName: state.userName 
                })
            });
    
            console.log('Join room response status:', response.status);
            const data = await response.json();
            console.log('Join room response:', data);
            
            if (data.success) {
                state.roomId = code;
                state.roomOwner = false;
                console.log('✅ Joined room:', state.roomId);
                await startCall();
                showToast('Присоединились к звонку');
            } else {
                throw new Error(data.error || 'Комната не найдена');
            }
        } catch (error) {
            console.error('Join room error:', error);
            showToast('Ошибка присоединения');
        } finally {
            hideLoading();
        }
    }
    
    // Запрос доступа к микрофону
    async function requestMicrophonePermission() {
        try {
            console.log('Requesting microphone permission...');
            state.localStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true,
                    channelCount: 1
                },
                video: false
            });
            
            console.log('✅ Microphone access granted');
            console.log('Audio tracks:', state.localStream.getAudioTracks().length);
            
            // Включаем микрофон по умолчанию
            state.isMuted = false;
            state.localStream.getAudioTracks().forEach(track => {
                track.enabled = true;
            });
            updateMicUI();
            
            return state.localStream;
        } catch (error) {
            console.error('Microphone permission error:', error);
            
            let errorMessage = 'Ошибка доступа к микрофону';
            if (error.name === 'NotAllowedError') {
                errorMessage = 'Доступ к микрофону отклонен. Разрешите доступ в настройках браузера.';
            } else if (error.name === 'NotFoundError') {
                errorMessage = 'Микрофон не найден. Убедитесь, что микрофон подключен.';
            } else if (error.name === 'NotReadableError') {
                errorMessage = 'Микрофон уже используется другим приложением.';
            }
            
            showToast(errorMessage, 5000);
            throw error;
        }
    }
    
    // Начало звонка
    async function startCall() {
        try {
            console.log('🚀 Starting call in room:', state.roomId);
            
            // Показываем экран звонка
            showScreen('callScreen');
            document.getElementById('currentRoomCode').textContent = state.roomId;
            
            // Обновляем UI кнопок
            updateShareButton();
            
            // Авто-копирование кода при создании
            if (state.roomOwner) {
                setTimeout(() => copyRoomCode(), 500);
            }
            
            // Запускаем обновления
            startUpdates();
            
            // Обновляем список участников
            await updateParticipants();
            
        } catch (error) {
            console.error('Start call error:', error);
            showToast('Ошибка начала звонка: ' + error.message);
            showScreen('homeScreen');
        }
    }
    
    function updateShareButton() {
        const shareBtn = document.getElementById('shareBtn');
        if (navigator.share) {
            shareBtn.style.display = 'flex';
            shareBtn.title = 'Поделиться кодом';
        } else {
            shareBtn.style.display = 'none';
        }
    }
    
    // Управление микрофоном
    function toggleMic() {
        if (!state.localStream) {
            requestMicrophonePermission().then(() => {
                state.isMuted = false;
                updateMicUI();
                showToast('Микрофон включен', 1500);
            }).catch(error => {
                showToast('Не удалось получить доступ к микрофону');
            });
            return;
        }
        
        state.isMuted = !state.isMuted;
        state.localStream.getAudioTracks().forEach(track => {
            track.enabled = !state.isMuted;
        });
        
        updateMicUI();
        showToast(state.isMuted ? 'Микрофон выключен' : 'Микрофон включен', 1500);
        
        // Отправляем статус всем участникам
        Object.keys(state.peerConnections).forEach(peerId => {
            sendSignal(peerId, 'audioStatus', { muted: state.isMuted });
        });
    }
    
    function updateMicUI() {
        const btn = document.getElementById('muteBtn');
        if (!btn) return;
        
        btn.classList.toggle('active', state.isMuted);
        btn.innerHTML = state.isMuted ? 
            '<i class="fas fa-microphone-slash"></i>' : 
            '<i class="fas fa-microphone"></i>';
        
        btn.title = state.isMuted ? 'Включить микрофон' : 'Выключить микрофон';
    }
    
    // Управление динамиком
    function toggleSpeaker() {
        state.isSpeaker = !state.isSpeaker;
        
        const btn = document.getElementById('speakerBtn');
        if (!btn) return;
        
        btn.classList.toggle('active', state.isSpeaker);
        
        if (state.isSpeaker && 'setSinkId' in HTMLAudioElement.prototype) {

                audio.setSinkId('').catch(console.error);
            });
        }
        
        showToast(state.isSpeaker ? 'Основной динамик' : 'Стандартный', 1500);

    // Копирование кода комнаты
    async function copyRoomCode() {
        if (!state.roomId) return;
        
        try {
            await navigator.clipboard.writeText(state.roomId);
            showToast('Код скопирован');
        } catch (error) {
            const input = document.createElement('input');
            input.value = state.roomId;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            showToast('Код скопирован');
        }
    }
    
    // Поделиться кодом
    async function shareRoomCode() {
        if (!state.roomId) return;
        
        if (navigator.share) {
            try {
                await navigator.share({
                    title: 'Присоединиться к звонку',
                    text: `Код звонка: ${state.roomId}`,
                    url: window.location.href
                });
            } catch (error) {
                if (error.name !== 'AbortError') {
                    copyRoomCode();
                }
            }
        } else {
            copyRoomCode();
        }
    }
    
    // Запуск обновлений
    function startUpdates() {
        if (state.updateInterval) clearInterval(state.updateInterval);
        if (state.signalInterval) clearInterval(state.signalInterval);
        if (state.statsInterval) clearInterval(state.statsInterval);
        
        console.log('🔄 Starting updates for room:', state.roomId);
        
        // Обновление списка участников каждые 3 секунды
        state.updateInterval = setInterval(() => {
            updateParticipants();
        }, 3000);
        
        // Получение сигналов WebRTC
        state.signalInterval = setInterval(() => {
            pollSignals();
        }, 2000);
        
        // Проверка подключения
        setInterval(() => {
            checkConnection();
        }, 30000);
        
        // Мониторинг статистики соединения
        state.statsInterval = setInterval(() => {
            monitorConnections();
        }, 10000);
        
        // Первый запрос
        setTimeout(() => {
            updateParticipants();
            pollSignals();
        }, 500);
    }
    
    // Мониторинг соединений
    async function monitorConnections() {
        Object.keys(state.peerConnections).forEach(async (peerId) => {
            const pc = state.peerConnections[peerId];
            if (pc && pc.iceConnectionState) {
                console.log(`📊 ${peerId}: ICE=${pc.iceConnectionState}, Signaling=${pc.signalingState}`);
                
                // Если соединение в disconnected более 30 секунд, пытаемся переподключиться
                if (pc.iceConnectionState === 'disconnected') {
                    if (!state.reconnectionAttempts[peerId]) {
                        state.reconnectionAttempts[peerId] = { startTime: Date.now(), attempts: 0 };
                    }
                    
                    const disconnectedTime = Date.now() - state.reconnectionAttempts[peerId].startTime;
                    if (disconnectedTime > 30000 && state.reconnectionAttempts[peerId].attempts < 3) {
                        console.log(`🔄 Attempting to reconnect to ${peerId}`);
                        state.reconnectionAttempts[peerId].attempts++;
                        await attemptReconnection(peerId);
                    }
                } else if (pc.iceConnectionState === 'connected') {
                    // Сброс счетчика переподключений при успешном соединении
                    delete state.reconnectionAttempts[peerId];
                }
            }
        });
    }
    
    // Попытка переподключения
    async function attemptReconnection(peerId) {
        console.log(`🔁 Reconnection attempt for ${peerId}`);
        
        const pc = state.peerConnections[peerId];
        if (!pc) return;
        
        try {
            // Создаем новый offer
            const offer = await pc.createOffer({
                offerToReceiveAudio: true,
                iceRestart: true
            });
            
            await pc.setLocalDescription(offer);
            await sendSignal(peerId, 'offer', offer);
            console.log(`📤 Sent renegotiation offer to ${peerId}`);
        } catch (error) {
            console.error(`❌ Reconnection error for ${peerId}:`, error);
        }
    }
    
    // Обновление списка участников
    async function updateParticipants() {
        if (!state.roomId) return;
        
        try {
            console.log('🔄 Updating participants...');
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'getParticipants', 
                    roomId: state.roomId,
                    userId: state.userId 
                })
            });
    
            if (response.ok) {
                const data = await response.json();
                if (data.success) {
                    const oldParticipants = state.participants.map(p => p.id).sort();
                    const newParticipants = data.participants.map(p => p.id).sort();
                    
                    const participantsChanged = JSON.stringify(oldParticipants) !== JSON.stringify(newParticipants);
                    
                    state.participants = data.participants || [];
                    
                    if (participantsChanged) {
                        console.log('👥 Participants updated:', state.participants.length, 'participants');
                        renderParticipants();
                        
                        connectToNewParticipants(oldParticipants, newParticipants);
                    }
                }
            }
        } catch (error) {
            console.error('Update participants error:', error);
        }
    }
    
    // Подключение к новым участникам
    function connectToNewParticipants(oldList, newList) {
        const newParticipants = newList.filter(id => 
            id !== state.userId && 
            !oldList.includes(id) && 
            !state.peerConnections[id]
        );
        
        newParticipants.forEach(peerId => {
            console.log('🤝 Connecting to new participant:', peerId);
            createPeerConnection(peerId);
        });
        
        // Удаляем соединения с вышедшими участниками
        Object.keys(state.peerConnections).forEach(peerId => {
            if (!newList.includes(peerId) && peerId !== state.userId) {
                console.log('👋 Cleaning up connection to left participant:', peerId);
                cleanupPeerConnection(peerId);
            }
        });
    }
    
    // Отрисовка участников
    function renderParticipants() {
        const container = document.getElementById('participantsView');
        if (!container) return;
        
        container.innerHTML = '';
        
        if (state.participants.length === 0) {
            container.innerHTML = `
                <div style="text-align: center; padding: 40px; color: rgba(255, 255, 255, 0.4);">
                    <i class="fas fa-users" style="font-size: 48px; margin-bottom: 20px;"></i>
                    <p>Ожидание участников...</p>
                </div>
            `;
            return;
        }
        
        const sortedParticipants = [...state.participants].sort((a, b) => {
            if (a.isOwner && !b.isOwner) return -1;
            if (!a.isOwner && b.isOwner) return 1;
            
            const aSpeaking = state.audioAnalyzers[a.id]?.speaking || false;
            const bSpeaking = state.audioAnalyzers[b.id]?.speaking || false;
            
            if (aSpeaking && !bSpeaking) return -1;
            if (!aSpeaking && bSpeaking) return 1;
            
            return 0;
        });
        
        sortedParticipants.forEach(p => {
            const card = createParticipantCard(p);
            container.appendChild(card);
        });
    }
    
    function createParticipantCard(participant) {
        const isMe = participant.id === state.userId;
        const isOwner = participant.isOwner;
        const isSpeaking = state.audioAnalyzers[participant.id]?.speaking || false;
        
        const card = document.createElement('div');
        card.className = `participant-card ${isSpeaking ? 'speaking' : ''} ${isMe ? 'me' : ''}`;
        
        const initials = getInitials(participant.name || participant.id);
        const color = getColor(participant.id);
        
        // Верхняя строка (аватар + информация + кнопка удаления)
        const row = document.createElement('div');
        row.className = 'participant-row';
        
        // Аватар
        const avatar = document.createElement('div');
        avatar.className = 'participant-avatar';
        avatar.style.background = color;
        avatar.textContent = initials;
        
        // Информация
        const info = document.createElement('div');
        info.className = 'participant-info';
        info.innerHTML = `
            <div class="participant-name">
                ${participant.name || participant.id}
                ${isMe ? ' (Вы)' : ''}
            </div>
            <div class="participant-status">
                <div class="status-indicator ${isSpeaking ? 'speaking' : ''}"></div>
                ${isSpeaking ? 'Говорит' : 'В сети'}
                ${isOwner ? '<span class="participant-badge">Создатель</span>' : ''}
            </div>
        `;
        
        row.appendChild(avatar);
        row.appendChild(info);
        
        // Кнопка удаления (только для создателя и не для себя)
        if (state.roomOwner && !isMe) {
            const kickBtn = document.createElement('button');
            kickBtn.className = 'kick-btn';
            kickBtn.innerHTML = '<i class="fas fa-user-slash"></i>';
            kickBtn.onclick = () => kickParticipant(participant.id);
            row.appendChild(kickBtn);
        }
        
        card.appendChild(row);
        
        // Ползунок громкости (для всех кроме себя)
        if (!isMe) {
            const volumeBlock = document.createElement('div');
            volumeBlock.className = 'participant-volume';
            const volumeValue = state.volumes[participant.id] || 1;
            volumeBlock.innerHTML = `
                <input type="range" min="0" max="3" step="0.1" value="${volumeValue}" 
                       data-peerid="${participant.id}" class="volume-slider">
                <span class="volume-value" data-peerid="${participant.id}">${Math.round(volumeValue * 100)}%</span>
            `;
            
            // Обработчик изменения громкости
            const slider = volumeBlock.querySelector('.volume-slider');
            slider.addEventListener('input', (e) => {
                const val = e.target.value;
                updateVolume(participant.id, val);
            });
            
            card.appendChild(volumeBlock);
        }
        
        return card;
    }
    
    function getInitials(name) {
        const words = name.split(' ');
        if (words.length >= 2) {
            return (words[0][0] + words[1][0]).toUpperCase();
        }
        return name.substring(0, 2).toUpperCase();
    }
    
    function getColor(id) {
        const colors = [
            '#667eea', '#764ba2', '#f093fb', '#f5576c',
            '#00d2ff', '#3a7bd5', '#5eead4', '#10b981'
        ];
        let hash = 0;
        for (let i = 0; i < id.length; i++) {
            hash = id.charCodeAt(i) + ((hash << 5) - hash);
        }
        return colors[Math.abs(hash) % colors.length];
    }
    
    // Управление участниками
    async function kickParticipant(participantId) {
        if (!confirm('Удалить участника из звонка?')) return;
        
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'kickParticipant',
                    roomId: state.roomId,
                    userId: state.userId,
                    participantId
                })
            });
            
            const data = await response.json();
            if (data.success) {
                showToast('Участник удален');
                updateParticipants();
            }
        } catch (error) {
            showToast('Ошибка удаления');
        }
    }
    
    // WebRTC соединения
    async function createPeerConnection(peerId) {
        if (state.peerConnections[peerId]) {
            console.log(`⚠️ Peer connection to ${peerId} already exists`);
            return;
        }
        
        console.log(`🔗 Creating peer connection to ${peerId}`);
        
        if (peerId === state.userId) {
            console.log(`⚠️ Cannot create peer connection to self`);
            return;
        }
        
        if (state.connectionAttempts[peerId] && state.connectionAttempts[peerId] > 2) {
            console.log(`⏳ Too many connection attempts to ${peerId}`);
            return;
        }
        
        if (!state.connectionAttempts[peerId]) {
            state.connectionAttempts[peerId] = 0;
        }
        state.connectionAttempts[peerId]++;
        
        try {
            const pc = new RTCPeerConnection(config);
            state.peerConnections[peerId] = pc;
            
            // Добавляем локальные треки
            if (state.localStream) {
                state.localStream.getTracks().forEach(track => {
                    try {
                        pc.addTrack(track, state.localStream);
                        console.log(`🔗 Added ${track.kind} track to ${peerId}`);
                    } catch (error) {
                        console.error('Error adding track:', error);
                    }
                });
            }
            
            // Обработчики событий
            pc.onicecandidate = (e) => {
                if (e.candidate) {
                    console.log(`❄️ ICE candidate for ${peerId}: ${e.candidate.type}`);
                    sendSignal(peerId, 'candidate', e.candidate);
                } else {
                    console.log(`❄️ ICE gathering complete for ${peerId}`);
                }
            };
            
            pc.ontrack = (e) => {
                console.log(`🎵 Received track from ${peerId}`);
                handleRemoteTrack(e, peerId);
            };
            
            pc.oniceconnectionstatechange = () => {
                console.log(`🔗 ICE connection state for ${peerId}: ${pc.iceConnectionState}`);
                
                switch(pc.iceConnectionState) {
                    case 'connected':
                    case 'completed':
                        console.log(`✅ Connected to ${peerId}`);
                        state.connectionAttempts[peerId] = 0;
                        break;
                        
                    case 'disconnected':
                        console.log(`⚠️ Disconnected from ${peerId} - attempting to recover`);
                        setTimeout(() => {
                            if (pc.iceConnectionState === 'disconnected') {
                                console.log(`🔄 Initiating ICE restart for ${peerId}`);
                                attemptIceRestart(pc, peerId);
                            }
                        }, 2000);
                        break;
                        
                    case 'failed':
                        console.log(`❌ Connection failed to ${peerId}`);
                        setTimeout(() => {
                            if (state.participants.some(p => p.id === peerId)) {
                                console.log(`🔄 Attempting to reconnect to ${peerId}`);
                                cleanupPeerConnection(peerId);
                                setTimeout(() => createPeerConnection(peerId), 1000);
                            }
                        }, 5000);
                        break;
                        
                    case 'closed':
                        console.log(`❌ Connection closed to ${peerId}`);
                        cleanupPeerConnection(peerId);
                        break;
                }
            };
            
            pc.onnegotiationneeded = async () => {
                console.log(`🔄 Negotiation needed for ${peerId}`);
                try {
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    await sendSignal(peerId, 'offer', offer);
                } catch (error) {
                    console.error(`❌ Error during negotiation with ${peerId}:`, error);
                }
            };
            
            // Определяем инициатора
            const shouldCreateOffer = state.userId < peerId;
            console.log(`🤔 Should create offer for ${peerId}? ${shouldCreateOffer}`);
            
            if (shouldCreateOffer) {
                console.log(`📤 Creating initial offer for ${peerId}`);
                try {
                    const offer = await pc.createOffer({
                        offerToReceiveAudio: true,
                        offerToReceiveVideo: false
                    });
                    
                    await pc.setLocalDescription(offer);
                    await sendSignal(peerId, 'offer', offer);
                    console.log(`✅ Initial offer sent to ${peerId}`);
                } catch (error) {
                    console.error(`❌ Error creating initial offer for ${peerId}:`, error);
                }
            } else {
                console.log(`⏳ Waiting for offer from ${peerId}`);
            }
            
            // Обработка ожидающих кандидатов
            if (state.pendingCandidates[peerId]) {
                console.log(`🔗 Processing ${state.pendingCandidates[peerId].length} pending candidates`);
                state.pendingCandidates[peerId].forEach(candidate => {
                    try {
                        pc.addIceCandidate(new RTCIceCandidate(candidate));
                    } catch (error) {
                        console.error('Error adding pending candidate:', error);
                    }
                });
                delete state.pendingCandidates[peerId];
            }
            
        } catch (error) {
            console.error(`❌ Create peer connection error for ${peerId}:`, error);
            cleanupPeerConnection(peerId);
        }
    }
    
    // Перезапуск ICE
    async function attemptIceRestart(pc, peerId) {
        try {
            console.log(`🔄 Attempting ICE restart for ${peerId}`);
            const offer = await pc.createOffer({ iceRestart: true });
            await pc.setLocalDescription(offer);
            await sendSignal(peerId, 'offer', offer);
            console.log(`✅ ICE restart offer sent to ${peerId}`);
        } catch (error) {
            console.error(`❌ ICE restart failed for ${peerId}:`, error);
        }
    }
    
    // Новая обработка удалённого трека с Web Audio (усиление >100%)
    function handleRemoteTrack(event, peerId) {
        console.log(`🎵 Setting up remote track for ${peerId}`);
        const stream = event.streams[0];
        if (!stream) return;
    
        // Удаляем предыдущую обработку для этого участника
        cleanupAudioNodes(peerId);
    
        // Создаём тихий audio-элемент (только для резерва, звук пойдёт через Web Audio)
        const audio = document.createElement('audio');
        audio.id = `audio_${peerId}`;
        audio.autoplay = true;
        audio.volume = 0; // без звука
        audio.style.display = 'none';
        audio.srcObject = stream;
        document.getElementById('audioContainer').appendChild(audio);
    
        // Создаём Web Audio цепочку
        if (!state.audioContext) {
            state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            // Возобновляем контекст, если он был приостановлен
            if (state.audioContext.state === 'suspended') {
                state.audioContext.resume();
            }
        }
    
        const source = state.audioContext.createMediaStreamSource(stream);
        const analyser = state.audioContext.createAnalyser();
        analyser.fftSize = 256;
        analyser.smoothingTimeConstant = 0.8;
    
        const gainNode = state.audioContext.createGain();
        // Устанавливаем сохранённую громкость (по умолчанию 1 = 100%)
        const savedVolume = state.volumes[peerId] || 1;
        gainNode.gain.value = savedVolume;
    
        // Подключаем: source -> analyser -> gainNode -> destination
        source.connect(analyser);
        analyser.connect(gainNode);
        gainNode.connect(state.audioContext.destination);
    
        // Сохраняем узлы
        state.audioNodes[peerId] = { source, analyser, gainNode };
    
        // Запускаем детектор речи на analyser (до усиления, чтобы индикатор был объективным)
        setupSpeechDetection(analyser, peerId);
    }
    
    // Очистка Web Audio узлов для участника
    function cleanupAudioNodes(peerId) {
        const nodes = state.audioNodes[peerId];
        if (nodes) {
            try {
                nodes.source.disconnect();
                nodes.analyser.disconnect();
                nodes.gainNode.disconnect();
            } catch (e) {}
            delete state.audioNodes[peerId];
        }
        // Удаляем audio элемент
        const audio = document.getElementById(`audio_${peerId}`);
        if (audio) audio.remove();
        
        // Удаляем из анализаторов речи
        if (state.audioAnalyzers[peerId]) {
            delete state.audioAnalyzers[peerId];
        }
    }
    
    // Детектор речи на основе AnalyserNode
    function setupSpeechDetection(analyser, peerId) {
        const data = new Uint8Array(analyser.frequencyBinCount);
        let speakingTimeout = null;
        let lastSpeakingState = false;
    
        function detect() {
            if (!state.audioNodes[peerId]) return; // узел удалён
    
            analyser.getByteFrequencyData(data);
            const average = data.reduce((a, b) => a + b) / data.length;
            const isSpeaking = average > 20;
    
            if (isSpeaking !== lastSpeakingState) {
                lastSpeakingState = isSpeaking;
                if (!state.audioAnalyzers) state.audioAnalyzers = {};
                state.audioAnalyzers[peerId] = { speaking: isSpeaking, lastUpdate: Date.now() };
    
                if (isSpeaking) {
                    renderParticipants();
                } else {
                    clearTimeout(speakingTimeout);
                    speakingTimeout = setTimeout(() => {
                        renderParticipants();
                    }, 500);
                }
            }
    
            requestAnimationFrame(detect);
        }
    
        detect();
    }
    
    // Обновление громкости для участника
    function updateVolume(peerId, value) {
        value = parseFloat(value);
        state.volumes[peerId] = value;
        localStorage.setItem('call_volumes', JSON.stringify(state.volumes));
        
        const nodes = state.audioNodes[peerId];
        if (nodes) {
            nodes.gainNode.gain.value = value;
        }
        
        // Обновить отображение процентов в карточке
        const volumeSpan = document.querySelector(`.volume-value[data-peerid="${peerId}"]`);
        if (volumeSpan) {
            volumeSpan.textContent = Math.round(value * 100) + '%';
        }
    }
    
    // Очистка соединения с участником
    function cleanupPeerConnection(peerId) {
        if (state.peerConnections[peerId]) {
            state.peerConnections[peerId].close();
            delete state.peerConnections[peerId];
        }
        cleanupAudioNodes(peerId);
        console.log(`🧹 Cleaned up peer connection to ${peerId}`);
    }
    
    // Получение сигналов
    async function pollSignals() {
        if (!state.roomId) return;
        
        try {
            console.log(`📡 Polling signals for room ${state.roomId}`);
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'getSignals',
                    roomId: state.roomId,
                    userId: state.userId,
                    timestamp: state.lastPollTime
                })
            });
    
            if (response.ok) {
                const data = await response.json();
                if (data.success && data.signals) {
                    console.log(`📡 Received ${data.signals.length} signals`);
                    state.lastPollTime = Date.now();
                    
                    for (const signal of data.signals) {
                        await handleSignal(signal);
                    }
                }
            }
        } catch (error) {
            console.error('📡 Signal polling error:', error);
        }
    }
    
    async function handleSignal(signal) {
        const signalId = `${signal.from}_${signal.type}_${JSON.stringify(signal.data)}`;
        
        if (state.processedSignals.has(signalId)) {
            console.log(`📨 Skipping duplicate signal: ${signalId}`);
            return;
        }
        
        state.processedSignals.add(signalId);
        
        if (state.processedSignals.size > 100) {
            const first = state.processedSignals.values().next().value;
            state.processedSignals.delete(first);
        }
        
        if (signal.from === state.userId) {
            console.log(`📨 Ignoring signal from self`);
            return;
        }
        
        console.log(`📨 Processing signal from ${signal.from}, type: ${signal.type}`);
        
        try {
            switch (signal.type) {
                case 'offer':
                    await handleOffer(signal.from, signal.data);
                    break;
                case 'answer':
                    await handleAnswer(signal.from, signal.data);
                    break;
                case 'candidate':
                    await handleCandidate(signal.from, signal.data);
                    break;
                case 'audioStatus':
                    console.log(`📨 Audio status from ${signal.from}:`, signal.data);
                    break;
                case 'kicked':
                    if (signal.to === state.userId) {
                        showToast('Вас удалили из звонка');
                        leaveRoom();
                    }
                    break;
                default:
                    console.log(`📨 Unknown signal type: ${signal.type}`);
            }
        } catch (error) {
            console.error(`❌ Error handling signal from ${signal.from}:`, error);
        }
    }
    
    async function sendSignal(to, type, data) {
        if (!state.roomId) return;
        
        try {
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'signal',
                    roomId: state.roomId,
                    userId: state.userId,
                    signal: { to, type, data }
                })
            });
        } catch (error) {
            console.error('Send signal error:', error);
        }
    }
    
    // Обработка предложения
    async function handleOffer(peerId, offer) {
        console.log(`📨 Received offer from ${peerId}`);
        
        let pc = state.peerConnections[peerId];
        
        if (!pc) {
            console.log(`🔗 Creating new peer connection for offer from ${peerId}`);
            pc = new RTCPeerConnection(config);
            state.peerConnections[peerId] = pc;
            
            // Настройка обработчиков
            pc.onicecandidate = (e) => {
                if (e.candidate) {
                    sendSignal(peerId, 'candidate', e.candidate);
                }
            };
            
            pc.ontrack = (e) => {
                handleRemoteTrack(e, peerId);
            };
            
            // Добавляем локальный поток
            if (state.localStream) {
                state.localStream.getTracks().forEach(track => {
                    try {
                        pc.addTrack(track, state.localStream);
                    } catch (error) {
                        console.error('Error adding track in handleOffer:', error);
                    }
                });
            }
        }
        
        try {
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            console.log(`✅ Set remote description from ${peerId}`);
            
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await sendSignal(peerId, 'answer', answer);
            console.log(`✅ Answer sent to ${peerId}`);
            
        } catch (error) {
            console.error(`❌ Error handling offer from ${peerId}:`, error);
        }
    }
    
    // Обработка ответа
    async function handleAnswer(peerId, answer) {
        console.log(`📨 Received answer from ${peerId}`);
        
        const pc = state.peerConnections[peerId];
        if (!pc) {
            console.warn(`No peer connection for ${peerId}`);
            return;
        }
        
        try {
            await pc.setRemoteDescription(new RTCSessionDescription(answer));
            console.log(`✅ Set remote description (answer) from ${peerId}`);
        } catch (error) {
            console.error(`❌ Error setting remote description from ${peerId}:`, error);
        }
    }
    
    // Обработка кандидата
    async function handleCandidate(peerId, candidate) {
        console.log(`📨 Received candidate from ${peerId}`);
        
        const pc = state.peerConnections[peerId];
        if (!pc) {
            console.log(`⏳ No peer connection for ${peerId}, caching candidate`);
            
            if (!state.pendingCandidates[peerId]) {
                state.pendingCandidates[peerId] = [];
            }
            state.pendingCandidates[peerId].push(candidate);
            return;
        }
        
        try {
            await pc.addIceCandidate(new RTCIceCandidate(candidate));
            console.log(`✅ Added ICE candidate from ${peerId}`);
        } catch (error) {
            // Кэшируем кандидат если remoteDescription еще не установлен
            if (error.message.includes('remote description was null')) {
                console.log(`📦 Caching candidate for ${peerId} (remote desc not set)`);
                if (!state.pendingCandidates[peerId]) {
                    state.pendingCandidates[peerId] = [];
                }
                state.pendingCandidates[peerId].push(candidate);
            } else {
                console.warn(`⚠️ Add ICE candidate warning: ${error.message}`);
            }
        }
    }
    
    // Выход из звонка
    async function leaveRoom() {
        if (!confirm('Завершить звонок?')) return;
        
        if (state.roomId) {
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'leaveRoom', 
                        roomId: state.roomId, 
                        userId: state.userId 
                    })
                });
            } catch (error) {
                console.error('Leave error:', error);
            }
        }
        
        cleanup();
        showScreen('homeScreen');
        document.getElementById('roomCode').value = '';
    }
    
    function cleanup() {
        console.log('🧹 Cleaning up...');
        
        if (state.updateInterval) clearInterval(state.updateInterval);
        if (state.signalInterval) clearInterval(state.signalInterval);
        if (state.statsInterval) clearInterval(state.statsInterval);
        
        Object.values(state.peerConnections).forEach(pc => {
            if (pc) pc.close();
        });
        state.peerConnections = {};
        
        // Очищаем все Web Audio узлы
        Object.keys(state.audioNodes).forEach(peerId => cleanupAudioNodes(peerId));
        state.audioNodes = {};
        state.audioAnalyzers = {};
        
        if (state.localStream) {
            state.localStream.getTracks().forEach(track => track.stop());
            state.localStream = null;
        }
        
        const container = document.getElementById('audioContainer');
        if (container) container.innerHTML = '';
        
        if (state.audioContext) {
            state.audioContext.close();
            state.audioContext = null;
        }
        
        // Сброс состояния
        state.roomId = null;
        state.roomOwner = false;
        state.pendingCandidates = {};
        state.connectionAttempts = {};
        state.lastPollTime = 0;
        state.processedSignals.clear();
        state.reconnectionAttempts = {};
    }
    
    // Утилиты
    function showLoading(text = 'Загрузка...') {
        const loading = document.getElementById('loading');
        if (loading) {
            loading.style.display = 'flex';
        }
        
        const loadingText = document.getElementById('loadingText');
        if (loadingText) {
            loadingText.textContent = text;
        }
    }
    
    function hideLoading() {
        const loading = document.getElementById('loading');
        if (loading) {
            loading.style.display = 'none';
        }
    }
    
    // Горячие клавиши
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && state.roomId) {
            leaveRoom();
        }
        if (e.key === 'm' && (e.ctrlKey || e.metaKey)) {
            toggleMic();
            e.preventDefault();
        }
        if (e.key === 'Enter' && document.activeElement.id === 'roomCode') {
            joinRoom();
            e.preventDefault();
        }
    });
    
    // Обработка ввода кода
    const roomCodeInput = document.getElementById('roomCode');
    if (roomCodeInput) {
        roomCodeInput.addEventListener('input', function(e) {
            this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            if (this.value.length > 6) {
                this.value = this.value.substring(0, 6);
            }
        });
    }
    
    // Предотвращение выключения экрана
    if ('wakeLock' in navigator) {
        let wakeLock = null;
        
        async function requestWakeLock() {
            try {
                if (!wakeLock && state.roomId) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.log('Wake Lock error:', err);
            }
        }
        
        function releaseWakeLock() {
            if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
            }
        }
        
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && state.roomId) {
                requestWakeLock();
            }
        });
        
        window.addEventListener('beforeunload', releaseWakeLock);
    }
    
    // Возобновление AudioContext при возвращении на страницу
    document.addEventListener('visibilitychange', () => {
        if (state.audioContext && document.visibilityState === 'visible') {
            state.audioContext.resume();
        }
    });
    
    // PWA установка
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        
        setTimeout(() => {
            if (deferredPrompt) {
                showToast('Установите приложение для быстрого доступа');
            }
        }, 5000);
    });
</script>
